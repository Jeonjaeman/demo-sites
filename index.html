<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Demo Portal | 데모사이트 모음</title>
<meta name="description" content="제안용 데모사이트 통합 포털 — 각 산업별 데모를 한 곳에서." />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet" />
<style>
  :root{
    --cyan:#36c5f0; --blue:#1f72e6; --blue2:#1559cf; --navy:#0a1120; --navy2:#111c30;
    --ink:#e8eef9; --muted:#90a0bd; --line:rgba(255,255,255,.08);
    --grad:linear-gradient(135deg,#36c5f0,#1f72e6 55%,#1559cf);
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:"Pretendard",system-ui,sans-serif;background:var(--navy);color:var(--ink);
    background-image:radial-gradient(60% 50% at 80% -10%,rgba(31,114,230,.25),transparent 60%),radial-gradient(50% 40% at 0% 0%,rgba(54,197,240,.16),transparent 55%);}
  .en{font-family:"Montserrat",sans-serif}
  .wrap{max-width:1180px;margin:0 auto;padding:0 24px}

  header.top{padding:30px 0;display:flex;align-items:center;justify-content:space-between}
  .brand{display:flex;align-items:center;gap:12px;font-weight:800}
  .brand .logo{width:40px;height:40px;border-radius:11px;background:var(--grad);display:grid;place-items:center;color:#fff;font-family:"Montserrat";font-weight:900}
  .brand small{display:block;color:var(--muted);font-size:11px;letter-spacing:.25em;font-weight:600}
  header.top a.gh{color:var(--muted);font-size:14px;border:1px solid var(--line);padding:9px 18px;border-radius:999px;text-decoration:none;transition:.2s}
  header.top a.gh:hover{color:#fff;border-color:rgba(255,255,255,.3)}

  .hero{padding:70px 0 40px;text-align:center}
  .hero .ey{font-family:"Montserrat";font-weight:800;letter-spacing:.3em;color:var(--cyan);font-size:13px}
  .hero h1{font-size:clamp(34px,6vw,64px);margin:16px 0 14px;letter-spacing:-.02em;line-height:1.05}
  .hero h1 span{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
  .hero p{color:var(--muted);font-size:17px;max-width:620px;margin:0 auto;line-height:1.7}
  .count{display:inline-flex;gap:8px;margin-top:22px;color:var(--muted);font-size:14px;align-items:center}
  .count b{color:#fff}

  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px;padding:30px 0 80px}
  .card{position:relative;display:flex;flex-direction:column;border:1px solid var(--line);border-radius:18px;overflow:hidden;
    background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02));text-decoration:none;color:inherit;
    transition:transform .3s cubic-bezier(.22,.61,.36,1),box-shadow .3s,border-color .3s}
  .card:hover{transform:translateY(-7px);border-color:rgba(54,197,240,.4);box-shadow:0 30px 60px -30px rgba(31,114,230,.6)}
  .card .thumb{height:148px;display:grid;place-items:center;font-family:"Montserrat";font-weight:900;font-size:30px;color:#fff;position:relative;overflow:hidden}
  .card .thumb::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,transparent,rgba(10,17,32,.55))}
  .card .body{padding:22px 22px 24px}
  .card h3{margin:0 0 7px;font-size:19px}
  .card p{margin:0;color:var(--muted);font-size:14px;line-height:1.6;min-height:42px}
  .card .meta{display:flex;align-items:center;justify-content:space-between;margin-top:16px}
  .badge{font-size:11px;font-weight:700;padding:5px 11px;border-radius:999px}
  .badge.live{background:rgba(28,155,84,.16);color:#34d27e}
  .badge.soon{background:rgba(255,255,255,.08);color:var(--muted)}
  .badge.repo{background:rgba(31,114,230,.16);color:#6fb0ff}
  .go{font-family:"Montserrat";font-weight:800;font-size:12px;letter-spacing:.08em;color:var(--cyan)}
  .card.disabled{opacity:.6;pointer-events:none}

  .tabbar{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;padding:4px 0 30px}
  .tab{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--line);
    background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02));
    color:var(--muted);padding:10px 18px;border-radius:999px;font-size:14px;font-weight:700;cursor:pointer;transition:.2s}
  .tab:hover{color:#fff;border-color:rgba(255,255,255,.25)}
  .tab.on{background:var(--grad);color:#fff;border-color:transparent;box-shadow:0 14px 30px -16px rgba(31,114,230,.8)}
  .tab .tc{font-size:12px;font-weight:800;background:rgba(0,0,0,.18);padding:1px 8px;border-radius:999px}
  .tab.on .tc{background:rgba(255,255,255,.22)}

  footer{border-top:1px solid var(--line);padding:30px 0;color:var(--muted);font-size:13px;text-align:center}

  @media(max-width:900px){.grid{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:600px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div class="brand">
      <span class="logo en">D</span>
      <span>DEMO PORTAL<small>제안용 데모 모음</small></span>
    </div>
    <a class="gh" href="https://github.com/Jeonjaeman" target="_blank" rel="noopener">GitHub ↗</a>
  </header>

  <section class="hero">
    <div class="ey">DEMO SHOWCASE</div>
    <h1>산업별 <span>데모사이트</span> 모음</h1>
    <p>각 산업·업종별 제안용 데모를 한 곳에서 모아 봅니다. 새 데모는 이 레포에 폴더로 추가되고, 기존 데모는 각자 배포 주소로 연결됩니다.</p>
    <div class="count">총 <b id="cnt">0</b>개 데모 · 클릭하면 새 탭에서 열립니다</div>
  </section>

  <section class="tabbar" id="tabbar"></section>
  <section class="grid" id="grid"></section>

  <footer>© 2026 Demo Portal · 본 사이트들은 제안용 데모입니다.</footer>
</div>

<script>
  // 데모 목록 — cat: home(홈페이지·브랜드) / admin(관리자·대시보드) / platform(플랫폼·서비스)
  const DEMOS = [
    { name:"B2B 코칭 프로젝트 관리", en:"BOOSTER", cat:"admin", desc:"코칭·워크숍 프로젝트 관리 + 성과 대시보드 · 5개 권한 분리(관리자/PM/코치/고객사HR/대상자) · 코칭목표합의서·트래킹·부스팅·결과리뷰·PDF/Excel", url:"./B2B코칭/index.html", status:"live", g:"linear-gradient(135deg,#6C5CF7,#4331C9)", here:true },
    { name:"글로벌 의료정보 플랫폼", en:"LUMIÈRE", cat:"platform", desc:"한·일 프리미엄 성형외과·치과 정보·예약 플랫폼 · 한/일 실시간 전환·병원목록/상세·캘린더 예약·병원/최고관리자 · AI 광고영상 히어로(힉스필드)·시네마틱 UI", url:"./글로벌의료정보플랫폼/index.html", status:"live", g:"linear-gradient(135deg,#F48FB8,#E85D9E 55%,#A78BFA)", here:true },
    { name:"전자 기부약정서", en:"PLEDGE", cat:"admin", desc:"대학 발전기금 태블릿 전자약정 PWA · 입력·전자서명·PDF 자동생성·관리자 다운로드", url:"./태블릿기부약정서/index.html", status:"live", g:"linear-gradient(135deg,#1a3860,#b58a3c)", here:true },
    { name:"키워드 분석 플랫폼", en:"PULSE", cat:"admin", desc:"네이버+4대 SNS(인스타·X·유튜브·틱톡) 키워드 통합 분석 BI 대시보드 · 다중검색·추이·인구통계·연관어·엑셀", url:"./키워드분석플랫폼/index.html", status:"live", g:"linear-gradient(135deg,#7c6cff,#22d3ee)", here:true },
    { name:"타겟 키워드 정보관리 백오피스", en:"MISIK", cat:"admin", desc:"맛집 정보 통합 관리 폐쇄형 백오피스 · 로그인/권한·검색/필터·협업·대시보드 + 키워드 자동수집(2차)", url:"./타겟키워드자동수집/index.html", status:"live", g:"linear-gradient(135deg,#5046e5,#8b5cf6)", here:true },
    { name:"앱 커뮤니티+광고", en:"MOA", cat:"platform", desc:"앱 커뮤니티 게시판 + 자체 광고 시스템 · 사용자(웹뷰)/관리자/광고주 3화면 · Supabase", url:"./커뮤니티광고플랫폼/index.html", status:"live", g:"linear-gradient(135deg,#6d5cf5,#a855f7)", here:true },
    { name:"창업지원협회", en:"KSSA", cat:"home", desc:"창업지원협회 공식 홈페이지 · 롤링배너·공지/정보·1:1문의·회원·관리자", url:"./창업지원협회/index.html", status:"live", g:"linear-gradient(135deg,#1d4ed8,#0a7d5a)", here:true },
    { name:"운송포탈", en:"HANUL", cat:"platform", desc:"전국 화물 운송 통합 플랫폼 · 운임조회·견적·관리자", url:"./운송포탈/index.html", status:"live", g:"linear-gradient(135deg,#1b3a6b,#0f2548)", here:true },
    { name:"건축자재", en:"HAOS", cat:"home", desc:"HAOS × Sto 건축자재 브랜드 데모", url:"https://jeonjaeman.github.io/haos-demo/", status:"live", g:"linear-gradient(135deg,#5a4636,#2c2118)" },
    { name:"여성 피트니스", en:"VIVAFIT", cat:"home", desc:"여성 전용 프리미엄 피트니스 브랜드", url:"https://jeonjaeman.github.io/vivafit-demo/", status:"live", g:"linear-gradient(135deg,#7a2f5e,#3a1530)" },
    { name:"중고 건설장비", en:"JANGIN", cat:"platform", desc:"굴삭기 등 중고 건설장비 거래 플랫폼", url:"https://jeonjaeman.github.io/jangin-demo/", status:"live", g:"linear-gradient(135deg,#6b5a1b,#352b0f)" },
    { name:"매출·인보이스 관리", en:"GOLD", cat:"admin", desc:"GoldInvoice 매출/정산 관리 서비스", url:"https://jeonjaeman.github.io/goldinvoice/", status:"live", g:"linear-gradient(135deg,#1b5a4a,#0f2c25)" },
    { name:"보안업체", en:"SECURION", cat:"home", desc:"기업 보안·관제 서비스 브랜드", url:"https://jeonjaeman.github.io/securion-demo/", status:"live", g:"linear-gradient(135deg,#23314f,#141d30)" },
    { name:"업무요청 접수", en:"AS", cat:"admin", desc:"AS·업무요청 접수 관리 시스템", url:"https://jeonjaeman.github.io/as-demo/", status:"live", g:"linear-gradient(135deg,#2f4a6b,#172638)" },
    { name:"회사제품 소개", en:"SOON", cat:"home", desc:"준비 중인 데모입니다", url:"#", status:"soon", g:"linear-gradient(135deg,#2a3344,#1a2130)" }
  ];

  // 카테고리 탭
  const CATS = [
    { key:"all", label:"전체" },
    { key:"home", label:"홈페이지" },
    { key:"platform", label:"플랫폼" },
    { key:"admin", label:"대시보드" },
  ];
  let activeCat = "all";

  const grid = document.getElementById("grid");
  const tabbar = document.getElementById("tabbar");
  const badgeHtml = (s)=> s==="live" ? '<span class="badge live">● LIVE</span>'
    : s==="repo" ? '<span class="badge repo">GitHub</span>'
    : '<span class="badge soon">준비중</span>';
  const goHtml = (s)=> s==="soon" ? '' : '<span class="go">OPEN ↗</span>';
  const inCat = (d)=> activeCat==="all" || d.cat===activeCat;

  function renderTabs(){
    tabbar.innerHTML = CATS.map(c=>{
      const n = c.key==="all" ? DEMOS.length : DEMOS.filter(d=>d.cat===c.key).length;
      return `<button class="tab ${c.key===activeCat?'on':''}" data-cat="${c.key}">${c.label} <span class="tc">${n}</span></button>`;
    }).join("");
  }

  // 카드 정렬: 홈페이지 → 플랫폼 → 대시보드, 준비중 카드는 맨 뒤
  const CAT_RANK = { home:0, platform:1, admin:2 };
  const catRank = (d)=> CAT_RANK[d.cat]===undefined ? 9 : CAT_RANK[d.cat];
  function renderGrid(){
    grid.innerHTML = DEMOS.filter(inCat).sort((a,b)=>{
      const sa = a.status==="soon"?1:0, sb = b.status==="soon"?1:0;
      if(sa!==sb) return sa-sb;
      return catRank(a)-catRank(b);
    }).map(d=>{
      const tag = d.status==="soon" ? "div" : "a";
      const attrs = d.status==="soon" ? 'class="card disabled"'
        : `class="card" href="${d.url}" target="_blank" rel="noopener"`;
      return `<${tag} ${attrs}>
        <div class="thumb" style="background:${d.g}"><span style="position:relative;z-index:1">${d.en}</span></div>
        <div class="body">
          <h3>${d.name}</h3>
          <p>${d.desc}</p>
          <div class="meta">${badgeHtml(d.status)}${goHtml(d.status)}</div>
        </div>
      </${tag}>`;
    }).join("");
  }

  tabbar.addEventListener("click", (e)=>{
    const b = e.target.closest("[data-cat]"); if(!b) return;
    activeCat = b.getAttribute("data-cat");
    renderTabs(); renderGrid();
  });

  renderTabs();
  renderGrid();
  document.getElementById("cnt").textContent = DEMOS.filter(d=>d.status!=="soon").length;
</script>
</body>
</html>
