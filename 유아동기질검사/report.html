<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>기질검사 결과지 (PDF 렌더링) | KidTempo</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<link rel="stylesheet" href="assets/style.css" />
<style>
/* ===================== 결과지 뷰어 (화면) ===================== */
body{background:#5C6B68;margin:0}
.viewer-top{
  position:sticky;top:0;z-index:50;background:rgba(12,26,24,.94);backdrop-filter:blur(12px);
  color:#D6E3E0;display:flex;align-items:center;gap:12px;padding:11px 20px;border-bottom:1px solid rgba(255,255,255,.08);
}
.viewer-top .bk{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;color:#AFC1BE;padding:7px 11px;border-radius:9px}
.viewer-top .bk:hover{background:rgba(255,255,255,.08);color:#fff}
.viewer-top b{color:#fff;font-size:14px}
.viewer-top .sp{flex:1}
.viewer-top select{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);color:#fff;padding:8px 11px;border-radius:9px;font-size:13px;font-family:inherit;outline:none;font-weight:600}
.viewer-top select option{background:#16211F}
.viewer-top .pill{font-size:11.5px;font-weight:800;background:rgba(255,255,255,.1);padding:5px 10px;border-radius:99px;color:#AFC1BE}
.viewer-top .btn{border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.06);color:#fff}
.viewer-top .btn:hover{background:rgba(255,255,255,.14)}
.viewer-top .btn.pri{border-color:transparent}

.pages{padding:26px 16px 60px;display:flex;flex-direction:column;align-items:center;gap:20px}
.page{
  width:210mm;min-height:297mm;height:297mm;background:#fff;position:relative;overflow:hidden;
  box-shadow:0 24px 60px -24px rgba(0,0,0,.5);color:#16211F;
  display:flex;flex-direction:column;
}
.pno{position:absolute;left:0;right:0;bottom:0;height:14mm;display:flex;align-items:center;justify-content:space-between;padding:0 16mm;font-size:8.5pt;color:#9AA8A6;font-weight:700}
.pno .b{display:flex;align-items:center;gap:5px;font-weight:800;color:#B7C4C1}
.pbody{flex:1;padding:16mm 16mm 16mm;display:flex;flex-direction:column;min-height:0}  /* 하단 16mm = 페이지 푸터 영역 침범 방지 */

/* 페이지 공통 타이포 */
.page h2.ph{font-size:19pt;letter-spacing:-.04em;margin:0 0 2mm}
.page .pe{font-size:8.5pt;font-weight:800;color:#12A594;letter-spacing:.14em;margin-bottom:1.5mm}
.page .plead{font-size:9.5pt;color:#6C7B79;line-height:1.6;margin-bottom:6mm}
.page .sechd{display:flex;align-items:center;gap:6px;font-size:11pt;font-weight:800;letter-spacing:-.02em;margin:0 0 3mm}
.page .sechd .ln{flex:1;height:1px;background:#E4EAE9}
.rule{height:1px;background:#E4EAE9;margin:4mm 0}

/* 표지 */
.cover{background:linear-gradient(165deg,#EAF8F6 0%,#FFFFFF 45%,#FFF4EC 100%)}
.cover .cin{flex:1;display:flex;flex-direction:column;padding:20mm 18mm 10mm}
.cover .brandline{display:flex;align-items:center;gap:9px}
.cover .brandline .mk{width:34px;height:34px;border-radius:10px;background:var(--grad);display:grid;place-items:center;box-shadow:0 10px 20px -10px rgba(18,165,148,.7)}
.cover .brandline .mk svg{width:18px;height:18px;stroke:#fff;stroke-width:2;fill:none}
.cover .brandline b{font-size:13pt;letter-spacing:-.02em;display:block;line-height:1.1}
.cover .brandline span{font-size:6.5pt;letter-spacing:.2em;color:#6C7B79;font-weight:800}
.cover h1{font-size:30pt;letter-spacing:-.05em;line-height:1.15;margin:14mm 0 3mm}
.cover h1 em{font-style:normal;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
.cover .sub{font-size:11pt;color:#6C7B79;font-weight:600}
.cover .hero{flex:1;display:grid;place-items:center;position:relative;margin:4mm 0}
.cover .hero img{width:78mm;height:78mm;object-fit:contain;filter:drop-shadow(0 18px 30px rgba(0,0,0,.10))}
.cover .hero .halo{position:absolute;width:96mm;height:96mm;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.9),rgba(255,255,255,0) 68%);z-index:0}
.cover .hero img{position:relative;z-index:1}
.cover .typenm{text-align:center;margin-top:-4mm}
.cover .typenm .tg{display:inline-block;font-size:8.5pt;font-weight:800;padding:2mm 4mm;border-radius:99px;letter-spacing:.02em}
.cover .typenm h3{font-size:20pt;letter-spacing:-.04em;margin:2.5mm 0 1mm}
.cover .typenm p{font-size:10pt;color:#6C7B79;font-weight:600}
.cover .meta{display:grid;grid-template-columns:repeat(4,1fr);gap:0;border:1px solid #DCE6E4;border-radius:4mm;overflow:hidden;background:#fff;margin-top:6mm}
.cover .meta div{padding:4mm;border-right:1px solid #ECF1F0;text-align:center}
.cover .meta div:last-child{border-right:0}
.cover .meta small{display:block;font-size:7.5pt;color:#9AA8A6;font-weight:700;margin-bottom:1.5mm}
.cover .meta b{font-size:10.5pt;letter-spacing:-.02em}
.cover .cfoot{padding:6mm 18mm;background:#0C1A18;color:#8FA5A1;font-size:8pt;display:flex;justify-content:space-between;align-items:center}
.cover .cfoot b{color:#fff}
.page.cover .pno{display:none}   /* 표지는 자체 푸터를 사용 */

/* 요약 카드 */
.sumcard{display:grid;grid-template-columns:52mm 1fr;gap:7mm;border:1px solid #E4EAE9;border-radius:5mm;padding:6mm;background:#FBFDFC}
.sumcard .ill{border-radius:4mm;display:grid;place-items:center;padding:3mm}
.sumcard .ill img{width:100%;object-fit:contain}
.sumcard h3{font-size:17pt;letter-spacing:-.04em;margin-bottom:1.5mm}
.sumcard .tl{font-size:9.5pt;color:#6C7B79;font-weight:700;margin-bottom:3mm}
.sumcard p{font-size:9.5pt;line-height:1.72;color:#3D4A48}
.axes{display:flex;flex-direction:column;gap:3mm;margin-top:4mm}
.ax{display:grid;grid-template-columns:16mm 1fr 16mm;align-items:center;gap:3mm}
.ax small{font-size:8pt;font-weight:800;color:#9AA8A6}
.ax small.on{color:#16211F}
.ax .trk{height:7px;border-radius:99px;background:#EDF1F0;position:relative}
.ax .trk i{position:absolute;top:50%;width:13px;height:13px;border-radius:50%;background:#fff;border:3px solid #12A594;transform:translate(-50%,-50%);box-shadow:0 2px 6px rgba(0,0,0,.12)}
.ax .trk::before{content:'';position:absolute;left:50%;top:-3px;bottom:-3px;width:1px;background:#CBD8D5}

.fbadges{display:grid;grid-template-columns:repeat(3,1fr);gap:3mm;margin-top:5mm}
.fbadge{border:1px solid #E4EAE9;border-radius:3.4mm;padding:3.4mm;display:flex;align-items:center;gap:3mm}
.fbadge .dot{width:9px;height:9px;border-radius:3px;flex:0 0 9px}
.fbadge b{font-size:9pt;display:block;letter-spacing:-.02em}
.fbadge small{font-size:7.6pt;color:#9AA8A6;font-weight:700}
.fbadge .tv{margin-left:auto;font-size:12pt;font-weight:800;letter-spacing:-.04em}

/* 표 */
table.rt{width:100%;border-collapse:collapse;font-size:9pt}
table.rt th{background:#F4F8F7;color:#6C7B79;font-size:8pt;font-weight:800;padding:2.6mm 3mm;text-align:left;border-bottom:1px solid #DCE6E4;white-space:nowrap}
table.rt td{padding:2.6mm 3mm;border-bottom:1px solid #EFF3F2;vertical-align:middle}
table.rt td.n{text-align:right;font-variant-numeric:tabular-nums}
table.rt td.c{text-align:center}
table.rt tr:last-child td{border-bottom:0}
table.rt.zebra tbody tr:nth-child(even){background:#FAFCFB}
.bpill{display:inline-block;font-size:7.6pt;font-weight:800;padding:1mm 2.4mm;border-radius:99px}

/* 요인 상세 블록 — 두 블록이 페이지 높이를 균등하게 채움 */
.fdet{border:1px solid #E4EAE9;border-radius:4.5mm;padding:5mm;display:grid;grid-template-columns:1fr 62mm;gap:5mm;align-items:center;flex:1}
.fdet + .fdet{margin-top:5mm}
.fdet .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:2mm;margin-top:3.5mm}
.fdet .stats div{background:#F7FAF9;border-radius:2.5mm;padding:2.4mm 2.6mm}
.fdet .stats small{display:block;font-size:7pt;color:#9AA8A6;font-weight:800;margin-bottom:.8mm}
.fdet .stats b{font-size:9.5pt;letter-spacing:-.02em}
.fdet .hd{display:flex;align-items:center;gap:2.5mm;margin-bottom:2.5mm}
.fdet .hd .bar{width:4px;height:16px;border-radius:2px}
.fdet .hd b{font-size:12pt;letter-spacing:-.03em}
.fdet .hd .t{margin-left:auto;font-size:9pt;font-weight:800;color:#6C7B79}
.fdet h4{font-size:10.5pt;margin-bottom:2mm;letter-spacing:-.03em}
.fdet p{font-size:9pt;line-height:1.7;color:#3D4A48}
.fdet .tip{margin-top:3mm;background:#F1FAF8;border-left:3px solid #12A594;border-radius:0 2.5mm 2.5mm 0;padding:3mm 3.5mm}
.fdet .tip b{font-size:8pt;color:#0B7B70;display:block;margin-bottom:1mm;letter-spacing:.02em}
.fdet .tip p{font-size:8.8pt;line-height:1.65;color:#2C3A38}
.fdet .cv{border:1px solid #EFF3F2;border-radius:3mm;padding:2mm}
.fdet .cv .cap{font-size:7.4pt;color:#9AA8A6;font-weight:700;text-align:center;margin-top:1mm}

/* 유형 상세 */
.tcols{display:grid;grid-template-columns:1fr 1fr;gap:5mm;margin-top:5mm}
.tbox{border:1px solid #E4EAE9;border-radius:4.5mm;padding:5mm}
.tbox b.h{display:flex;align-items:center;gap:2mm;font-size:10pt;margin-bottom:3mm;letter-spacing:-.02em}
.tbox b.h i{width:5mm;height:5mm;border-radius:1.6mm;display:grid;place-items:center;font-style:normal;font-size:7pt;color:#fff}
.tbox ul{margin:0;padding-left:4.5mm}
.tbox li{font-size:9pt;line-height:1.75;color:#3D4A48;margin-bottom:1.5mm}
.plan{display:flex;flex-direction:column;gap:3mm}
.wk{display:grid;grid-template-columns:20mm 1fr;gap:4mm;border:1px solid #E4EAE9;border-radius:4mm;padding:4mm;align-items:start}
.wk .w{background:var(--grad);color:#fff;border-radius:2.5mm;text-align:center;padding:2.5mm 1mm}
.wk .w b{display:block;font-size:11pt;letter-spacing:-.03em}
.wk .w small{font-size:7pt;opacity:.85;font-weight:700}
.wk h5{font-size:10pt;margin-bottom:1.5mm;letter-spacing:-.02em}
.wk p{font-size:8.8pt;line-height:1.65;color:#3D4A48}
.wk .todo{margin-top:2mm;display:flex;flex-wrap:wrap;gap:1.5mm}
.wk .todo span{font-size:7.6pt;font-weight:700;background:#F1F5F4;border-radius:99px;padding:1mm 2.5mm;color:#3D4A48}

/* 부록 — 48문항 원자료 (2단 · 24행/단 · 줄바꿈 금지로 페이지 넘침 방지)
   ※ table.rt td 보다 특이도가 높아야 패딩 압축이 적용됨 */
table.rt.itemtb{font-size:7.2pt;table-layout:fixed;width:100%}
table.rt.itemtb th{padding:1.5mm 1.2mm;font-size:6.6pt}
table.rt.itemtb td{padding:1.45mm 1.2mm;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3}
.itemtb col.c-no{width:5.5mm} .itemtb col.c-f{width:4mm} .itemtb col.c-t{width:auto}
.itemtb col.c-a{width:17mm} .itemtb col.c-r{width:8.5mm} .itemtb col.c-w{width:9.5mm}
.itemtb .fdot{display:block;width:2.4mm;height:2.4mm;border-radius:1px}
/* 역채점 배지는 문항 텍스트 앞에 — 말줄임으로 잘리지 않도록 */
.rev{display:inline-block;font-size:6.4pt;font-weight:800;color:#C4491F;background:#FDE9E3;border-radius:2px;padding:.2mm 1mm;margin-right:1mm}
.lik{display:inline-flex;gap:.6mm}
.lik i{width:2.8mm;height:2.8mm;border-radius:1px;background:#EDF1F0;font-style:normal}
.lik i.on{background:#12A594}

.notice{background:#FFF8F3;border:1px solid #FFE0CE;border-radius:4mm;padding:5mm}
.notice b{display:block;font-size:9.5pt;margin-bottom:2mm;color:#D9622F}
.notice p{font-size:8.6pt;line-height:1.72;color:#6C4A38}
.qr{width:22mm;height:22mm;border:1px solid #E4EAE9;border-radius:2mm;display:grid;place-items:center;background:#fff}

/* 워터마크 (검수용) */
.wm{position:absolute;inset:0;pointer-events:none;display:grid;place-items:center;z-index:5}
.wm span{font-size:60pt;font-weight:900;color:rgba(18,165,148,.06);transform:rotate(-24deg);letter-spacing:.1em}
body.nowm .wm{display:none}

/* ===================== 인쇄 ===================== */
@page{ size:A4; margin:0; }
@media print{
  body{background:#fff}
  .viewer-top,.toasts{display:none !important}
  .pages{padding:0;gap:0}
  .page{box-shadow:none;margin:0;page-break-after:always;break-after:page}
  .page:last-child{page-break-after:auto}
  html,body{width:210mm}
  *{-webkit-print-color-adjust:exact;print-color-adjust:exact}
}
</style>
</head>
<body class="nowm">

<div class="viewer-top">
  <a class="bk" href="dashboard.html"><svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M19 12H5M11 18l-6-6 6-6"/></svg> 대시보드</a>
  <b>결과지 PDF 렌더링</b>
  <span class="pill" id="pgcnt">12 pages · A4 · 300dpi</span>
  <div class="sp"></div>
  <label style="display:flex;align-items:center;gap:6px;font-size:12.5px;font-weight:600;color:#AFC1BE">
    <input type="checkbox" id="wmck" style="accent-color:#12A594"> 검수 워터마크
  </label>
  <select id="pick"></select>
  <button class="btn" id="dlJson">JSON</button>
  <button class="btn pri" id="print">PDF로 저장 / 인쇄</button>
</div>

<div class="pages" id="pages"></div>
<div class="toasts" id="toasts"></div>

<script src="assets/data.js"></script>
<script src="assets/engine.js"></script>
<script src="assets/charts.js"></script>
<script src="assets/app.js"></script>
<script>
/* ------------------------------------------------------------------
   결과지 렌더러 — Engine.score() 결과를 A4 12페이지로 바인딩
------------------------------------------------------------------- */
const BC = { vhigh:'#E2483D', high:'#F0A32B', mid:'#12A594', low:'#2E7BEA', vlow:'#7A6BF0' };
const BBG = { vhigh:'#FDE9E3', high:'#FEF2E0', mid:'#E9F5F3', low:'#E9F0FB', vlow:'#EEECFB' };
const scored = Engine.scoreAll().filter(s=>s.complete);

const pick = document.getElementById('pick');
pick.innerHTML = scored.map(s=>`<option value="${s.code}">${s.child} · ${s.code} · ${s.type.name}</option>`).join('');
const saved = Store.get('report.code');
if(saved && scored.some(s=>s.code===saved)) pick.value = saved;

function pageFrame(no, total, inner, cls=''){
  return `<section class="page ${cls}">
    ${inner}
    <div class="wm"><span>KIDTEMPO 검수본</span></div>
    <div class="pno">
      <span class="b">KidTempo · 유아동 기질검사 결과지</span>
      <span>${no} / ${total}</span>
    </div>
  </section>`;
}

function render(code){
  const resp = RESPONSES.find(r=>r.code===code);
  const sc = Engine.score(resp);
  const it = Engine.interpret(sc);
  const T = sc.type, ax = sc.axes;
  const N = 12;
  const F6 = FKEYS.map(k=>({ ...F[k], ...sc.factors[k] }));
  const axPos = v => Math.max(6, Math.min(94, (v-25)/50*100)); // T25~75 → 6~94%

  const html = [];

  /* ── p1 표지 */
  html.push(pageFrame(1, N, `
    <div class="cin">
      <div class="brandline">
        <div class="mk"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${ICONS.logo}</svg></div>
        <div><b>KidTempo</b><span>CHILD TEMPERAMENT ASSESSMENT</span></div>
      </div>
      <h1>우리 아이의<br><em>기질 프로파일</em> 리포트</h1>
      <div class="sub">${sc.child} 어린이 · ${sc.age} · ${fmt.sex(sc.sex)}</div>
      <div class="hero">
        <div class="halo"></div>
        <img src="${T.img}" alt="${T.name}">
      </div>
      <div class="typenm">
        <span class="tg" style="background:${T.color2};color:${T.color}">${T.en} TYPE · 확신도 ${T.confidence}%</span>
        <h3>${T.name}</h3>
        <p>${T.tagline}</p>
      </div>
      <div class="meta">
        <div><small>검사자 코드</small><b>${sc.code}</b></div>
        <div><small>검사일</small><b>${fmt.date(sc.at)}</b></div>
        <div><small>적용 규준</small><b>${sc.ageBand.label} ${fmt.sex(sc.sex)}</b></div>
        <div><small>응답자</small><b>${sc.guardian} (${resp.rel})</b></div>
      </div>
    </div>
    <div class="cfoot">
      <span>발급 · <b>KidTempo 자동 채점 엔진 v2.1</b></span>
      <span>본 결과지는 보호자 응답에 기반한 기질 프로파일이며 의학적 진단이 아닙니다.</span>
    </div>`, 'cover'));

  /* ── p2 검사 안내 */
  html.push(pageFrame(2, N, `<div class="pbody">
    <div class="pe">ABOUT THE TEST</div>
    <h2 class="ph">검사 안내 및 결과지 읽는 법</h2>
    <p class="plead">기질(temperament)은 타고난 반응 양식으로, 좋고 나쁨이 없습니다. 이 결과지는 아이를 규정하기 위한 것이 아니라, <b>아이에게 맞는 양육 방식을 찾기 위한 지도</b>입니다.</p>

    <div class="sechd">6가지 하위 요인 <span class="ln"></span></div>
    <table class="rt zebra">
      <thead><tr><th style="width:26mm">요인</th><th>측정 내용</th><th style="width:16mm" class="c">문항</th><th style="width:20mm" class="c">역채점</th></tr></thead>
      <tbody>
        ${FACTORS.map(f=>`<tr>
          <td><b style="color:${f.color}">${f.name}</b><br><small style="color:#9AA8A6;font-size:7.6pt">${f.en}</small></td>
          <td style="color:#3D4A48">${f.desc}</td>
          <td class="c">8</td>
          <td class="c">${ITEMS.filter(i=>i.f===f.key&&i.r).length}문항</td>
        </tr>`).join('')}
      </tbody>
    </table>

    <div class="sechd" style="margin-top:6mm">T점수와 백분위 읽는 법 <span class="ln"></span></div>
    <div style="display:grid;grid-template-columns:1fr 78mm;gap:6mm;align-items:center">
      <div>
        <p style="font-size:9pt;line-height:1.75;color:#3D4A48">같은 연령·성별 아이들의 평균을 <b>T점수 50</b>으로 놓고, 우리 아이가 그 평균에서 얼마나 떨어져 있는지를 나타냅니다. 표준편차 10을 기준으로 하므로 <b>T 40~60 사이에 전체의 약 68%</b>가 분포합니다.<br><br>
        <b>백분위</b>는 100명 중 몇 번째인지를 뜻합니다. 백분위 84%는 또래 100명 중 위에서 16번째라는 의미입니다. 높다고 좋은 것이 아니라 <b>‘또래보다 이 특성이 뚜렷하다’</b>는 뜻으로 읽어 주세요.</p>
        <div style="display:flex;gap:2mm;margin-top:4mm;flex-wrap:wrap">
          ${BANDS.map(b=>`<span class="bpill" style="background:${BBG[b.key]};color:${BC[b.key]}">${b.label} T${b.key==='vlow'?'≤35':b.key==='vhigh'?'≥65':`${b.min}–${Math.floor(b.max)}`}</span>`).join('')}
        </div>
      </div>
      <div id="cvGuide" style="height:34mm"></div>
    </div>

    <div class="notice" style="margin-top:auto">
      <b>결과 해석 시 유의사항</b>

      요인 원점수 = Σ(환산점수 × 가중치) · 요인별 가중치 합 8.00 고정
    </div>
  </div>`));

  /* ── p12 부록 B / 뒷표지 */
  html.push(pageFrame(12, N, `<div class="pbody">
    <div class="pe">APPENDIX B</div>
    <h2 class="ph">규준 정보 및 검사 고지</h2>
    <p class="plead">본 결과지에 적용된 규준과 산출 로직을 명시합니다.</p>

    <div class="sechd">적용 규준표 (${sc.ageBand.label} · ${fmt.sex(sc.sex)}) <span class="ln"></span></div>
    <table class="rt zebra">
      <thead><tr><th>요인</th><th class="n">평균 M</th><th class="n">표준편차 SD</th><th class="n">표본 n</th><th class="n">본 아동 원점수</th><th class="n">Z</th><th class="n">T</th></tr></thead>
      <tbody>${F6.map(f=>`<tr>
        <td><b style="color:${f.color}">${f.name}</b></td>
        <td class="n">${f.norm.m}</td><td class="n">${f.norm.sd}</td><td class="n">${f.norm.n}</td>
        <td class="n">${f.raw}</td><td class="n">${f.z>0?'+':''}${f.z}</td><td class="n"><b>${Math.round(f.t)}</b></td>
      </tr>`).join('')}</tbody>
    </table>

    <div class="sechd" style="margin-top:6mm">채점 로직 요약 <span class="ln"></span></div>
    <table class="rt">
      <tbody>
        <tr><td style="width:34mm"><b>척도</b></td><td>5점 리커트 (1 전혀 아니다 ~ 5 매우 그렇다) · 48문항 / 6요인 × 8문항</td></tr>
        <tr><td><b>역채점</b></td><td>역채점 문항 ${ITEMS.filter(i=>i.r).length}개 · 환산점수 = 6 − 응답값</td></tr>
        <tr><td><b>가중치</b></td><td>문항별 1.25 / 1.00 / 0.75 · 요인별 가중치 합 = 8.00 (원점수 범위 8~40)</td></tr>
        <tr><td><b>결측 처리</b></td><td>요인당 결측 2개 이하 시 응답 문항의 가중평균으로 보정(prorate), 3개 이상 시 채점 보류</td></tr>
        <tr><td><b>표준화</b></td><td>Z = (원점수 − M) / SD · T = 50 + 10Z (20~80 절단) · 백분위 = Φ(Z) × 100</td></tr>
        <tr><td><b>유형 판별</b></td><td>에너지=(ACT+APP)/2 · 정서=EMO · 조절=(PER+REG+ADP)/3 · 각 축 T50 기준 이분 → 2³ = 8유형</td></tr>
      </tbody>
    </table>

    <div class="notice" style="margin-top:6mm">
      <b>검사 고지 및 개인정보 안내</b>
      <p>· 본 검사는 선별·이해 목적의 기질 프로파일 도구이며, 의학적 진단이나 장애 판별의 근거로 사용될 수 없습니다.<br>
         · 수집된 응답 및 결과 데이터는 암호화되어 보관되며, 보유기간(3년) 경과 후 자동 파기됩니다.<br>
         · 결과지 재발급 및 데이터 삭제 요청은 검사기관 담당자에게 문의해 주십시오.</p>
    </div>

    <div style="margin-top:auto;display:flex;align-items:center;gap:5mm;border-top:1px solid #E4EAE9;padding-top:5mm">
      <div class="qr">
        <svg viewBox="0 0 24 24" width="42" height="42" fill="none" stroke="#B7C4C1" stroke-width="1.4">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
          <path d="M14 14h3v3h-3zM18 18h3v3h-3zM14 21h3M21 14v3"/>
        </svg>
      </div>
      <div style="flex:1">
        <b style="font-size:9.5pt;display:block;margin-bottom:1mm">결과지 진위 확인 · 재발급</b>
        <p style="font-size:8.4pt;color:#6C7B79;line-height:1.6">문서번호 ${sc.code}-R${fmt.date(sc.at).replace(/-/g,'')} · 발급일시 ${sc.at}<br>KidTempo 자동 채점 엔진 v2.1 · 검사 문의 02-000-0000</p>
      </div>
      <div style="text-align:right">
        <div style="font-size:7.5pt;color:#9AA8A6;font-weight:800;letter-spacing:.16em">KIDTEMPO</div>
        <div style="font-size:8pt;color:#6C7B79">© 2026 · All rights reserved</div>
      </div>
    </div>
  </div>`));

  document.getElementById('pages').innerHTML = html.join('');

  /* 차트 주입 */
  Chart.radar(document.getElementById('rd'), F6.map(f=>({ key:f.key, label:f.name, t:f.t, color:f.color })), { size:400 });
  Chart.barT(document.getElementById('bar'), F6.map(f=>({ label:f.name, t:f.t, pct:f.pct, color:f.color, band:f.band.key })), { width:660, rowH:44 });
  Chart.curve(document.getElementById('cvGuide'), 62, '#12A594', { width:300, height:110 });
  document.querySelectorAll('.cvbox').forEach(b=> Chart.curve(b, +b.dataset.t, b.dataset.c, { width:230, height:92 }));

  document.getElementById('pgcnt').textContent = `${N} pages · A4 · ${sc.child} · ${sc.type.name}`;
  return sc;
}

let current = render(pick.value);
pick.addEventListener('change', ()=>{ current = render(pick.value); Store.set('report.code', pick.value); window.scrollTo({top:0,behavior:'smooth'}); });
document.getElementById('wmck').addEventListener('change', e=> document.body.classList.toggle('nowm', !e.target.checked));
document.getElementById('print').addEventListener('click', ()=>{
  toast('브라우저 인쇄 대화상자에서 “PDF로 저장”을 선택하세요. (여백: 없음 / 배경 그래픽: 켜기)','ok');
  setTimeout(()=>window.print(), 700);
});
document.getElementById('dlJson').addEventListener('click', ()=>{
  const out = { code:current.code, child:current.child, age:current.age, sex:current.sex, type:current.type.key,
    axes:current.axes, factors:Object.fromEntries(FKEYS.map(k=>[k,{ raw:current.factors[k].raw, z:current.factors[k].z, t:current.factors[k].t, pct:current.factors[k].pct, band:current.factors[k].band.key }])) };
  const blob = new Blob([JSON.stringify(out,null,2)], { type:'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = `KidTempo_${current.code}_scores.json`; a.click();
  toast('채점 결과 JSON을 내려받았습니다.','ok');
});
</script>
</body>
</html>
