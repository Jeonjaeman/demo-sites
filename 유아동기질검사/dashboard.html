<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>대시보드 | KidTempo</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<link rel="stylesheet" href="assets/style.css" />
<style>
  .pipe{display:grid;grid-template-columns:repeat(4,1fr);gap:0;border:1px solid var(--line);border-radius:var(--r-lg);overflow:hidden;background:#fff}
  .pipe .st{padding:16px 18px;border-right:1px solid var(--line-2);position:relative}
  .pipe .st:last-child{border-right:0}
  .pipe .st .h{display:flex;align-items:center;gap:8px;margin-bottom:9px}
  .pipe .st .h .ic{width:30px;height:30px;border-radius:9px;display:grid;place-items:center}
  .pipe .st .h b{font-size:13px}
  .pipe .st .h .live{margin-left:auto;width:7px;height:7px;border-radius:99px;background:var(--ok);box-shadow:0 0 0 3px rgba(22,163,74,.16);animation:pl 2s infinite}
  @keyframes pl{0%,100%{opacity:1}50%{opacity:.35}}
  .pipe .st small{color:var(--muted);font-size:11.5px;display:block;line-height:1.5}
  .pipe .st .mt{margin-top:9px;font-size:11px;font-weight:800;color:var(--brand-700)}
  .pipe .st::after{content:'';position:absolute;right:-7px;top:50%;transform:translateY(-50%);width:14px;height:14px;border-radius:99px;background:#fff;border:1px solid var(--line);z-index:1}
  .pipe .st:last-child::after{display:none}

  .tlist{display:flex;flex-direction:column;gap:2px}
  .trow{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:10px}
  .trow:hover{background:var(--hover)}
  .trow img{width:34px;height:34px;object-fit:contain;border-radius:8px;flex:0 0 34px}
  .trow b{font-size:13px;display:block}
  .trow small{color:var(--muted);font-size:11px}
  .trow .bar{flex:1;max-width:130px}
  .trow .n{font-size:13px;font-weight:800;width:34px;text-align:right}

  .log{background:#0C1A18;border-radius:var(--r-lg);padding:16px 18px;font-family:"SF Mono",ui-monospace,Menlo,Consolas,monospace;font-size:11.5px;line-height:1.85;color:#8FA5A1;max-height:230px;overflow:auto}
  .log .ok{color:#4ADE80} .log .wr{color:#FBBF24} .log .er{color:#F87171} .log .k{color:#7DD3FC}
</style>
</head>
<body>
<script src="assets/data.js"></script>
<script src="assets/engine.js"></script>
<script src="assets/charts.js"></script>
<script src="assets/app.js"></script>
<script>
const c = mountShell('dashboard','운영 대시보드','구글 폼 수집 → 자동 채점 → 결과지 PDF 발급 현황',
  `<button class="btn" id="sync">${ico('sync')} 지금 동기화</button>
   <button class="btn pri" onclick="location.href='batch.html'">${ico('bolt')} 일괄 생성</button>`);

const S = Engine.scoreAll();
const done = RESPONSES.filter(r=>r.status==='done').length;
const errs = S.filter(s=>!s.validation.ok).length;
const warns = S.filter(s=>s.validation.ok && s.validation.issues.length).length;
const ok = S.filter(s=>s.complete).length;
const dist = Engine.typeDistribution(S);

/* 요인 평균 T */
const avgT = FKEYS.map(k=>{
  const arr = S.filter(s=>s.complete).map(s=>s.factors[k].t);
  return { key:k, label:F[k].name, color:F[k].color, t: Math.round(arr.reduce((a,b)=>a+b,0)/arr.length*10)/10 };
});

c.innerHTML = `
<div class="kpis">
  <div class="kpi">
    <div class="ic" style="background:var(--brand-50);color:var(--brand-700)">${ico('inbox',17)}</div>
    <div class="lb">누적 응답 수집</div><div class="vl">${RESPONSES.length}<em>건</em></div>
    <div class="df up">${ico('arrow',12)} 최근 3일 +${RESPONSES.length}건</div>
  </div>
  <div class="kpi">
    <div class="ic" style="background:var(--ok-50);color:var(--ok)">${ico('check',17)}</div>
    <div class="lb">자동 채점 완료</div><div class="vl">${ok}<em>건</em></div>
    <div class="df up">성공률 ${Math.round(ok/RESPONSES.length*100)}% · 평균 1.28초</div>
  </div>
  <div class="kpi">
    <div class="ic" style="background:var(--danger-50);color:var(--danger)">${ico('alert',17)}</div>
    <div class="lb">검증 오류 · 경고</div><div class="vl">${errs}<em>건</em> <span style="font-size:13px;color:var(--warn);font-weight:800">+ 경고 ${warns}</span></div>
    <div class="df dn">담당자 확인 필요</div>
  </div>
  <div class="kpi">
    <div class="ic" style="background:var(--coral-50);color:var(--coral-700)">${ico('file',17)}</div>
    <div class="lb">결과지 PDF 발급</div><div class="vl">${done}<em>부</em></div>
    <div class="df flat">대기 ${ok-done}부 · 12p / 1.4MB</div>
  </div>
</div>

<div class="mt">
  <div class="pipe">
    <div class="st">
      <div class="h"><div class="ic" style="background:#E9F0FB;color:#2560B8">${ico('sync',15)}</div><b>구글 폼 연동</b><span class="live"></span></div>
      <small>Apps Script 트리거 · onFormSubmit<br>스프레드시트 → REST 수신</small>
      <div class="mt">최근 동기화 2분 전 · 16/16건</div>
    </div>
    <div class="st">
      <div class="h"><div class="ic" style="background:#FDF4E3;color:#B27607">${ico('shield',15)}</div><b>응답 검증</b><span class="live"></span></div>
      <small>누락·범위·중복·규준연령·신뢰도<br>5개 규칙 자동 검사</small>
      <div class="mt">통과 ${RESPONSES.length-errs}건 · 반려 ${errs}건</div>
    </div>
    <div class="st">
      <div class="h"><div class="ic" style="background:var(--brand-50);color:var(--brand-700)">${ico('calc',15)}</div><b>채점 엔진</b><span class="live"></span></div>
      <small>역채점·가중치·규준 매핑<br>T점수/백분위/8유형 판별</small>
      <div class="mt">처리 ${ok}건 · 평균 1.28초</div>
    </div>
    <div class="st">
      <div class="h"><div class="ic" style="background:var(--coral-50);color:var(--coral-700)">${ico('file',15)}</div><b>PDF 렌더 · 저장</b><span class="live"></span></div>
      <small>HTML/CSS → Puppeteer 렌더<br>Google Drive 업로드 · 메일 발송</small>
      <div class="mt">발급 ${done}부 · 대기 ${ok-done}부</div>
    </div>
  </div>
</div>

<div class="g-2-1 mt">
  <div class="card">
    <div class="hd"><h3>일자별 응답 수집 추이</h3><div class="sp"></div><small>최근 7일 · 단위 건</small></div>
    <div class="bd"><div id="ln" style="height:210px"></div></div>
  </div>
  <div class="card">
    <div class="hd"><h3>기질 유형 분포</h3><div class="sp"></div><small>채점 ${ok}건</small></div>
    <div class="bd">
      <div id="dn" style="height:180px"></div>
      <div class="tlist mt-s">
        ${TYPE_LIST.map(t=>`<div class="trow">
          <img src="${t.img}" alt="">
          <div style="min-width:74px"><b>${t.name.split(' ')[1]||t.name}</b><small>${t.en}</small></div>
          <div class="bar thin"><i style="width:${(dist[t.key]/Math.max(1,ok)*100)}%;background:${t.color}"></i></div>
          <div class="n" style="color:${t.color}">${dist[t.key]}</div>
        </div>`).join('')}
      </div>
    </div>
  </div>
</div>

<div class="g-2-1 mt">
  <div class="card">
    <div class="hd"><h3>최근 응답</h3><div class="sp"></div>
      <a class="btn sm" href="responses.html">전체 보기 ${ico('arrow',13)}</a></div>
    <div class="bd tight">
      <table class="tb">
        <thead><tr><th>검사자</th><th>코드</th><th>연령/성별</th><th>제출</th><th>유형</th><th>상태</th><th></th></tr></thead>
        <tbody>
          ${S.slice().reverse().slice(0,7).map(s=>{
            const r = RESPONSES.find(x=>x.code===s.code);
            return `<tr>
              <td><div class="pr"><div class="av" style="background:${s.complete?s.type.color:'#B7C4C1'}">${initial(s.child)}</div>
                <div><b>${s.child}</b><small>${r.kinder}</small></div></div></td>
              <td class="mono">${s.code}</td>
              <td>${s.age.replace('만 ','')} · ${fmt.sex(s.sex)}</td>
              <td class="muted" style="font-size:12px">${s.at.slice(5)}</td>
              <td>${s.complete?`<span class="tag" style="background:${s.type.color2};color:${s.type.color}">${s.type.name}</span>`:'<span class="tag gray">—</span>'}</td>
              <td>${statusTag(r.status)}</td>
              <td class="ctr">${s.complete?`<button class="btn sm" onclick="openReport('${s.code}')">${ico('eye',13)} 결과지</button>`:`<a class="btn sm" href="responses.html">${ico('alert',13)} 확인</a>`}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
  </div>
  <div class="card">
    <div class="hd"><h3>요인별 평균 T점수</h3><div class="sp"></div><small>집단 프로파일</small></div>
    <div class="bd">
      <div id="mb" style="height:120px"></div>
      <div class="hr"></div>
      ${avgT.map(a=>`<div class="between" style="padding:5px 0">
        <span class="flex"><span style="width:8px;height:8px;border-radius:3px;background:${a.color}"></span>
        <b style="font-size:12.5px">${a.label}</b></span>
        <span class="flex"><span class="muted" style="font-size:11.5px">평균</span><b style="font-size:13px;color:${a.color}">T ${a.t}</b></span>
      </div>`).join('')}
    </div>
  </div>
</div>

<div class="card mt">
  <div class="hd"><h3>자동화 처리 로그</h3><div class="sp"></div><small class="mono">tail -f kidtempo/engine.log</small></div>
  <div class="bd">
    <div class="log" id="log"></div>
  </div>
</div>
`;

/* 차트 */
Chart.line(document.getElementById('ln'),
  [{ data:[0,0,3,3,5,4,1], color:'#12A594', area:true }],
  ['7/8','7/9','7/10','7/11','7/12','7/13','7/14'], { width:640, height:210 });
Chart.donut(document.getElementById('dn'),
  TYPE_LIST.map(t=>({ label:t.name, v:dist[t.key], color:t.color })), { size:180 });
Chart.miniBars(document.getElementById('mb'), avgT.map(a=>({ label:a.label.slice(0,2), t:a.t, color:a.color })), { width:300, height:120 });

/* 로그 */
const LOG = [
  ['ok',  '[07-14 10:58:12] <span class="k">SYNC</span> 구글 폼 응답 1건 수신 · responseId=ACYDBNh…0016'],
  ['wr',  '[07-14 10:58:12] <span class="k">VALIDATE</span> W01 무성의 응답 의심 · KT-2601-0016 (응답 SD 0.0) → 신뢰도 경고 표기'],
  ['ok',  '[07-14 10:58:13] <span class="k">SCORE</span> KT-2601-0016 채점 완료 · 1.31s · 유형=DOLPHIN'],
  ['er',  '[07-14 10:05:44] <span class="k">VALIDATE</span> E03 규준 적용 불가 연령 · KT-2601-0015 (만 2세 9개월) → 채점 중단, 담당자 알림'],
  ['er',  '[07-14 09:22:03] <span class="k">VALIDATE</span> E02 응답값 범위 오류 · KT-2601-0014 (12번=7, 31번=0) → 재수집 요청 메일 발송'],
  ['er',  '[07-13 15:58:31] <span class="k">VALIDATE</span> E01 문항 미응답 4건 · KT-2601-0013 (7,22,39,44번) → 재응답 링크 발송'],
  ['ok',  '[07-13 14:41:09] <span class="k">SCORE</span> KT-2601-0012 채점 완료 · 1.19s · 유형=LION'],
  ['ok',  '[07-12 11:38:52] <span class="k">RENDER</span> KidTempo_KT-2601-0003_이서준.pdf (12p / 1.4MB) → GDrive /2026/07 업로드 완료'],
  ['ok',  '[07-12 10:09:47] <span class="k">MAIL</span> 결과지 발송 완료 · mj.park****@naver.com (KT-2601-0002)'],
  ['ok',  '[07-12 09:22:15] <span class="k">RENDER</span> KidTempo_KT-2601-0001_김하윤.pdf (12p / 1.3MB) → GDrive /2026/07 업로드 완료'],
];
document.getElementById('log').innerHTML = LOG.map(([k,t])=>`<div><span class="${k}">${k==='ok'?'✓':k==='wr'?'⚠':'✗'}</span> ${t}</div>`).join('');

document.getElementById('sync').addEventListener('click', e=>{
  const b = e.currentTarget; b.disabled = true; b.innerHTML = ico('refresh') + ' 동기화 중…';
  setTimeout(()=>{ b.disabled=false; b.innerHTML = ico('sync') + ' 지금 동기화';
    toast('구글 폼 응답 시트와 동기화했습니다 · 신규 0건','ok'); }, 1200);
});
</script>
</body>
</html>
