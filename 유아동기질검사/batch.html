<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>결과지 일괄 생성 | KidTempo</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<link rel="stylesheet" href="assets/style.css" />
<style>
  .job{display:flex;align-items:center;gap:12px;padding:11px 14px;border:1px solid var(--line);border-radius:12px;margin-bottom:7px;background:#fff;transition:.2s}
  .job.run{border-color:var(--brand-200);background:var(--brand-50)}
  .job.ok{border-color:#C7EBD5;background:var(--ok-50)}
  .job img{width:30px;height:30px;object-fit:contain;flex:0 0 30px}
  .job b{font-size:13px;display:block}
  .job small{color:var(--muted);font-size:11px}
  .job .ph{flex:1;max-width:230px}
  .job .ph .lb{font-size:10.5px;font-weight:800;color:var(--muted);margin-bottom:4px;display:flex;justify-content:space-between}
  .job .st{width:96px;text-align:right}
  .spin{width:14px;height:14px;border:2px solid var(--brand-100);border-top-color:var(--brand);border-radius:99px;animation:sp .7s linear infinite;display:inline-block}
  @keyframes sp{to{transform:rotate(360deg)}}

  .opt{display:flex;align-items:flex-start;gap:10px;padding:11px 12px;border:1px solid var(--line);border-radius:12px;cursor:pointer;transition:.15s;background:#fff}
  .opt:hover{border-color:#D6DEDC}
  .opt.on{border-color:var(--brand);background:var(--brand-50);box-shadow:0 0 0 3px rgba(18,165,148,.08)}
  .opt input{accent-color:var(--brand);margin-top:2px}
  .opt b{font-size:12.8px;display:block}
  .opt small{font-size:11px;color:var(--muted);line-height:1.5;display:block;margin-top:2px}

  .perf{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
  .perf .p{border:1px solid var(--line);border-radius:12px;padding:13px 14px;background:#fff}
  .perf .p small{font-size:10.5px;color:var(--muted);font-weight:800;display:block;margin-bottom:5px}
  .perf .p b{font-size:18px;letter-spacing:-.04em}
  .perf .p .u{font-size:11px;color:var(--muted-2);font-weight:700;margin-top:3px}
</style>
</head>
<body>
<script src="assets/data.js"></script>
<script src="assets/engine.js"></script>
<script src="assets/charts.js"></script>
<script src="assets/app.js"></script>
<script>
const c = mountShell('batch','결과지 일괄 생성','채점 완료 건 → PDF 렌더링 → 저장소 업로드 → 보호자 발송',
  `<button class="btn" id="zip">${ico('down')} 전체 ZIP</button>
   <button class="btn pri" id="run">${ico('bolt')} 일괄 생성 실행</button>`);

const S = Engine.scoreAll().filter(s=>s.complete);
const issued = new Set(ISSUE_LOG.map(l=>l.code));
const pending = S.filter(s=>!issued.has(s.code));

c.innerHTML = `
<div class="g-2-1">
  <div class="card">
    <div class="hd">
      <h3>생성 대기 목록</h3><div class="sp"></div>
      <small id="cnt">${pending.length}건 선택됨 · 예상 소요 ${Math.ceil(pending.length*1.3)}초</small>
    </div>
    <div class="bd">
      <div id="jobs">
        ${pending.map(s=>`
          <div class="job" data-code="${s.code}">
            <input type="checkbox" checked style="accent-color:var(--brand)">
            <img src="${s.type.img}" alt="">
            <div style="min-width:150px">
              <b>${s.child} <span class="muted" style="font-weight:600">· ${s.age.replace('만 ','')} ${fmt.sex(s.sex)}</span></b>
              <small class="mono">${s.code} · ${s.type.name}</small>
            </div>
            <div class="ph">
              <div class="lb"><span class="ps">대기 중</span><span class="pv">0%</span></div>
              <div class="bar thin"><i style="width:0%"></i></div>
            </div>
            <div class="st"><span class="tag gray">대기</span></div>
          </div>`).join('')}
      </div>
      ${pending.length ? '' : '<div class="empty">'+ico('check',36)+'<b>모든 결과지가 발급되었습니다</b><p>새 응답이 채점되면 이곳에 표시됩니다.</p></div>'}
    </div>
  </div>

  <div class="card">
    <div class="hd"><h3>생성 옵션</h3></div>
    <div class="bd">
      <div class="fld">
        <label>저장 위치</label>
        <label class="opt on"><input type="radio" name="store" checked>
          <div><b>Google Drive</b><small>/기질검사/2026/07 · 서비스 계정 권한으로 업로드</small></div></label>
        <label class="opt" style="margin-top:6px"><input type="radio" name="store">
          <div><b>로컬 폴더 + ZIP</b><small>D:\\KidTempo\\output\\2026-07 · 일괄 압축 다운로드</small></div></label>
        <label class="opt" style="margin-top:6px"><input type="radio" name="store">
          <div><b>AWS S3 (암호화)</b><small>SSE-KMS · 사전서명 URL 7일 만료</small></div></label>
      </div>

      <div class="fld">
        <label>파일명 규칙</label>
        <input class="in mono" value="KidTempo_{코드}_{아동명}_{검사일}.pdf">
        <div class="hint">예시 · KidTempo_KT-2601-0009_강태오_20260713.pdf</div>
      </div>

      <div class="fld">
        <label>발송 · 표기</label>
        <label class="opt on"><input type="checkbox" checked>
          <div><b>보호자 이메일 자동 발송</b><small>결과지 PDF 첨부 + 해석 안내문 본문</small></div></label>
        <label class="opt" style="margin-top:6px"><input type="checkbox">
          <div><b>검수 워터마크 삽입</b><small>내부 검수본에만 표기 · 최종본에는 제외</small></div></label>
        <label class="opt on" style="margin-top:6px"><input type="checkbox" checked>
          <div><b>신뢰도 경고 표기</b><small>W01 경고 건은 결과지 3p에 경고 배지 표시</small></div></label>
      </div>

      <div class="fld" style="margin-bottom:0">
        <label>PDF 렌더 사양</label>
        <div class="mono" style="background:#F6F9F8;border-radius:10px;padding:11px 12px;font-size:11.5px;color:var(--ink-2);line-height:1.8">
          engine   : Puppeteer (Chromium headless)<br>
          format   : A4 · 210 × 297mm · 12 pages<br>
          quality  : 300dpi · printBackground: true<br>
          fonts    : Pretendard (embed) · 서브셋 임베딩
        </div>
      </div>
    </div>
  </div>
</div>

<div class="mt">
  <div class="perf">
    <div class="p"><small>부당 평균 렌더 시간</small><b>1.28초</b><div class="u">12페이지 · 차트 8종 포함</div></div>
    <div class="p"><small>100부 일괄 처리</small><b>2분 12초</b><div class="u">동시 4워커 · 큐 기반</div></div>
    <div class="p"><small>PDF 평균 용량</small><b>1.4MB</b><div class="u">이미지 최적화 후</div></div>
    <div class="p"><small>레이아웃 검증</small><b>156p 전수</b><div class="u">페이지 넘침 0건 (13명 × 12p)</div></div>
  </div>
</div>

<div class="card mt">
  <div class="hd"><h3>발급 이력</h3><div class="sp"></div><small>최근 발급 ${ISSUE_LOG.length}건</small></div>
  <div class="bd tight">
    <table class="tb">
      <thead><tr><th>파일명</th><th>검사자</th><th>유형</th><th class="ctr">페이지</th><th class="ctr">용량</th><th>저장 위치</th><th>발송</th><th>발급 시각</th><th></th></tr></thead>
      <tbody id="hist">
        ${ISSUE_LOG.map(l=>`<tr>
          <td class="mono" style="font-size:12px"><b>KidTempo_${l.code}_${l.child}.pdf</b></td>
          <td><div class="pr"><div class="av" style="background:${TYPES[l.type].color}">${initial(l.child)}</div><div><b>${l.child}</b><small>${l.code}</small></div></div></td>
          <td><span class="tag" style="background:${TYPES[l.type].color2};color:${TYPES[l.type].color}">${TYPES[l.type].name}</span></td>
          <td class="ctr">${l.pages}p</td><td class="ctr muted">${l.size}</td>
          <td class="muted" style="font-size:12px">${l.store}</td>
          <td>${l.ch==='대기'?'<span class="tag gray">발송 대기</span>':'<span class="tag ok">발송 완료</span>'}</td>
          <td class="muted" style="font-size:12px">${l.at}</td>
          <td class="ctr"><button class="btn sm" onclick="openReport('${l.code}')">${ico('eye',13)}</button></td>
        </tr>`).join('')}
      </tbody>
    </table>
  </div>
</div>
`;

/* -------- 일괄 생성 시뮬레이션 -------- */
const PHASES = [['채점 결과 로드',18],['HTML 템플릿 바인딩',34],['차트 SVG 렌더',52],['PDF 렌더링 (12p)',78],['저장소 업로드',92],['보호자 메일 발송',100]];

document.getElementById('run').addEventListener('click', async e=>{
  const btn = e.currentTarget;
  const jobs = [...document.querySelectorAll('.job')].filter(j=>j.querySelector('input').checked);
  if(!jobs.length) return toast('생성할 대상을 선택해 주세요','warn');
  btn.disabled = true; btn.innerHTML = `<span class="spin"></span> 생성 중…`;

  let done = 0;
  for(const j of jobs){
    j.classList.add('run');
    j.querySelector('.st').innerHTML = `<span class="tag brand"><span class="spin" style="width:9px;height:9px;border-width:1.5px"></span> 처리중</span>`;
    for(const [label,pct] of PHASES){
      await new Promise(r=>setTimeout(r, 130));
      j.querySelector('.ps').textContent = label;
      j.querySelector('.pv').textContent = pct + '%';
      j.querySelector('.bar i').style.width = pct + '%';
    }
    j.classList.remove('run'); j.classList.add('ok');
    j.querySelector('.ps').textContent = '완료 · 12p / 1.4MB';
    j.querySelector('.st').innerHTML = `<span class="tag ok">${ico('check',11)} 발급</span>`;
    const code = j.dataset.code;
    const s = S.find(x=>x.code===code);
    document.getElementById('hist').insertAdjacentHTML('afterbegin', `<tr style="background:var(--brand-50)">
      <td class="mono" style="font-size:12px"><b>KidTempo_${code}_${s.child}.pdf</b></td>
      <td><div class="pr"><div class="av" style="background:${s.type.color}">${initial(s.child)}</div><div><b>${s.child}</b><small>${code}</small></div></div></td>
      <td><span class="tag" style="background:${s.type.color2};color:${s.type.color}">${s.type.name}</span></td>
      <td class="ctr">12p</td><td class="ctr muted">1.4MB</td>
      <td class="muted" style="font-size:12px">GDrive /2026/07</td>
      <td><span class="tag ok">발송 완료</span></td>
      <td class="muted" style="font-size:12px">방금 전</td>
      <td class="ctr"><button class="btn sm" onclick="openReport('${code}')">${ico('eye',13)}</button></td>
    </tr>`);
    done++;
    document.getElementById('cnt').textContent = `${done}/${jobs.length}건 완료`;
  }
  btn.disabled = false; btn.innerHTML = ico('bolt') + ' 일괄 생성 실행';
  toast(`결과지 ${done}부 생성 완료 · Google Drive 업로드 및 보호자 발송까지 완료했습니다`,'ok');
});

document.getElementById('zip').addEventListener('click', ()=>
  toast('KidTempo_2026-07_결과지_16부.zip (21MB) 다운로드를 시작합니다','ok'));
</script>
</body>
</html>
