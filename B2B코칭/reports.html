<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>리포트 · 데이터 내보내기 | 하우 부스터</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css"/>
<link rel="stylesheet" href="assets/style.css"/>
<style>
  .page svg[viewBox="0 0 24 24"]{width:16px;height:16px;stroke-width:1.8;flex:0 0 auto;vertical-align:-3px}
  .page .kpi .ico svg{width:21px;height:21px}
  .page .btn.sm svg{width:14px;height:14px}
  .rgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px}
  .rcard{border:1.5px solid var(--line);border-radius:var(--r-lg);background:#fff;padding:16px;cursor:pointer;transition:.18s;display:flex;flex-direction:column;gap:9px;text-align:left}
  .rcard:hover{border-color:var(--brand-100);background:var(--brand-50)}
  .rcard.on{border-color:var(--brand);background:var(--brand-50);box-shadow:0 0 0 3px rgba(91,75,232,.1)}
  .rcard .ic{width:40px;height:40px;border-radius:11px;display:grid;place-items:center}
  .rcard .ic svg{width:19px!important;height:19px!important}
  .rcard b{font-size:14px}
  .rcard ul li{position:relative;padding-left:11px;font-size:11.8px;color:var(--muted);line-height:1.6}
  .rcard ul li::before{content:"";position:absolute;left:0;top:8px;width:3px;height:3px;border-radius:99px;background:var(--muted-2)}
  .chk{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:600;color:var(--ink-2);cursor:pointer;padding:6px 0}
  .spin{width:34px;height:34px;border:3px solid var(--brand-100);border-top-color:var(--brand);border-radius:99px;animation:sp .8s linear infinite;margin:0 auto 12px}
  @keyframes sp{to{transform:rotate(360deg)}}
  .cover{background:var(--grad);border-radius:var(--r-lg);color:#fff;padding:22px 24px;margin-bottom:16px}
  .cover h3{font-size:19px;margin-bottom:4px}
  .cover .m{font-size:12.5px;opacity:.85}
  .cover .tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:12px}
  .cover .tags span{background:rgba(255,255,255,.18);border-radius:99px;padding:3px 10px;font-size:11.5px;font-weight:700}
  .exp{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:12px}
  .ecard{border:1px solid var(--line);border-radius:12px;padding:14px;display:flex;flex-direction:column;gap:8px;background:#fff}
  @media(max-width:900px){ table.tbl{min-width:640px} }
</style>
</head>
<body>
<script src="assets/data.js"></script>
<script src="assets/app.js"></script>
<script src="assets/charts.js"></script>
<script>
const u = shell('reports');
const role = u ? session().role : null;

const TYPES = [
  { k:'proj', n:'프로젝트 현황 리포트', i:'folder', c:'var(--brand)', bg:'var(--brand-50)',
    d:'프로젝트 전체의 진행률과 실행 현황을 요약합니다.',
    items:['세션 진행 현황','대상자 목표 확정률','주간 체크인율','코치 피드백 작성률'] },
  { k:'ind', n:'개인 성과 리포트', i:'user', c:'var(--ok)', bg:'var(--ok-bg)',
    d:'대상자 1인의 목표·실행·변화를 종합합니다.',
    items:['코칭목표 및 행동지표','체크인 이력','코치 피드백','사전/사후 점수 변화'] },
  { k:'grp', n:'그룹 · 고객사 성과 리포트', i:'build', c:'var(--info)', bg:'var(--info-bg)',
    d:'고객사·그룹 단위의 성과를 비교 분석합니다.',
    items:['그룹별 진척도 비교','역량 영역별 분포','평균 점수 향상도','HR 보고용 요약'] },
  { k:'coach', n:'코치 활동 리포트', i:'chat', c:'var(--warn)', bg:'var(--warn-bg)',
    d:'코치별 세션·로그·피드백 활동을 집계합니다.',
    items:['코칭로그 작성 현황','피드백 작성률','부스터 발송 건수','대상자 만족도'] },
];
const ITEMS = ['코칭목표','행동지표','체크인 이력','코치 피드백','코칭로그','결과 리뷰','역량진단'];
let HIST = [
  { n:'2024 리더십 코칭 1기 — 중간 현황 리포트', t:'프로젝트 현황', by:'이피엠', at:'2024-05-28', f:'PDF' },
  { n:'A기업 그룹 성과 리포트 (4월)', t:'그룹·고객사 성과', by:'김하우', at:'2024-05-02', f:'Excel' },
  { n:'김지연 개인 성과 리포트', t:'개인 성과', by:'김코치', at:'2024-04-30', f:'PDF' },
  { n:'파트너 코치 활동 집계 (Q2)', t:'코치 활동', by:'김하우', at:'2024-04-15', f:'Excel' },
];
let type = 'proj';

function render(){
  $('#page').innerHTML = `
  <div class="between mb16">
    <div><h2 style="font-size:18px">리포트 · 데이터 내보내기</h2><div class="hint">성과 리포트를 생성하고 원본 데이터를 내보냅니다.</div></div>
    <span class="pill">${ROLES[role].label} · ${esc(ROLES[role].scope)}</span>
  </div>

  <div class="sec-t">${ico('doc')} 1. 리포트 유형 선택</div>
  <div class="rgrid mb20" id="rgrid">
    ${TYPES.map(t => `<button class="rcard ${t.k===type?'on':''}" data-k="${t.k}">
      <span class="ic" style="background:${t.bg};color:${t.c}">${ico(t.i)}</span>
      <b>${esc(t.n)}</b>
      <span class="small muted">${esc(t.d)}</span>
      <ul>${t.items.map(i => `<li>${esc(i)}</li>`).join('')}</ul>
    </button>`).join('')}
  </div>

  <div class="grid g-2-1 mb20">
    <div class="card">
      <div class="card-h">${ico('gear')}<h3>2. 리포트 조건 설정</h3></div>
      <div class="card-b">
        <div class="f-row c2">
          <div class="field"><label>프로젝트</label>
            <select class="inp" id="rProj">${PROJECTS.map(p => `<option value="${p.id}">${esc(p.name)}</option>`).join('')}</select></div>
          <div class="field"><label>대상</label>
            <div class="f-row c2">
              <select class="inp" id="rScope">
                <option value="all">전체</option><option value="grp">그룹</option><option value="one">개인</option>
              </select>
              <select class="inp" id="rTarget" disabled><option>전체 대상자</option></select>
            </div>
          </div>
        </div>
        <div class="f-row c2">
          <div class="field"><label>시작일</label><input class="inp" type="date" id="rFrom" value="2024-04-01"/></div>
          <div class="field"><label>종료일</label><input class="inp" type="date" id="rTo" value="2024-05-31"/></div>
        </div>
        <div class="field">
          <label>포함 항목</label>
          <div class="f-row c3">
            ${ITEMS.map((i, k) => `<label class="chk"><input type="checkbox" class="ck" value="${esc(i)}" ${k<5?'checked':''}/> ${esc(i)}</label>`).join('')}
          </div>
        </div>
        <div class="field" style="margin-bottom:0">
          <label>출력 형식</label>
          <div class="radio-row">
            <label><input type="radio" name="fmt" value="PDF" checked/> PDF</label>
            <label><input type="radio" name="fmt" value="Excel"/> Excel</label>
          </div>
        </div>
      </div>
      <div class="card-f">
        <span class="hint" id="fmtHint">선택한 항목이 리포트에 포함됩니다.</span>
        <span style="flex:1"></span>
        <button class="btn pri" id="genBtn">${ico('zap')} 리포트 생성</button>
      </div>
    </div>

    <div class="card">
      <div class="card-h">${ico('bulb')}<h3>리포트 활용 안내</h3></div>
      <div class="card-b">
        <div class="insight">
          <div class="ih">${ico('doc')} PDF</div>
          <ul><li>고객사 보고 · 대상자 개인 배포용. 표지·차트·요약이 포함된 인쇄 최적화 형식입니다.</li></ul>
        </div>
        <div class="insight">
          <div class="ih">${ico('bars')} Excel(CSV)</div>
          <ul><li>원본 데이터 분석용. 목표·행동지표·체크인 이력을 행 단위로 내보냅니다.</li></ul>
        </div>
        <div class="insight" style="margin-bottom:0">
          <div class="ih">${ico('shield')} 권한</div>
          <ul><li>데이터 내보내기는 <b>관리자 · 담당 PM · 고객사 HR</b>만 가능합니다. HR은 자사 데이터만 내보낼 수 있습니다.</li></ul>
        </div>
      </div>
    </div>
  </div>

  <div id="prevWrap"></div>

  <div class="card mb20">
    <div class="card-h">${ico('dl')}<h3>원본 데이터 내보내기</h3><span class="spacer"></span>
      <span class="hint">CSV(Excel) 형식으로 즉시 다운로드됩니다.</span></div>
    <div class="card-b">
      <div class="exp">
        <div class="ecard">
          <span class="row" style="gap:8px">${ico('users')}<b>대상자 목록</b></span>
          <span class="small muted">이름 · 소속 · 프로젝트 · 담당코치 · 진척도</span>
          <button class="btn sm block" onclick="expMembers()">${ico('dl')} CSV 내보내기</button>
        </div>
        <div class="ecard">
          <span class="row" style="gap:8px">${ico('target')}<b>코칭목표 · 행동지표</b></span>
          <span class="small muted">목표 · 역량 · 시작/목표 점수 · 지표별 실행률</span>
          <button class="btn sm block" onclick="expGoals()">${ico('dl')} CSV 내보내기</button>
        </div>
        <div class="ecard">
          <span class="row" style="gap:8px">${ico('checkbox')}<b>체크인 이력</b></span>
          <span class="small muted">주차 · 실행률 · 실행내용 · 장애물 · 다음 계획</span>
          <button class="btn sm block" onclick="expCheckins()">${ico('dl')} CSV 내보내기</button>
        </div>
        <div class="ecard">
          <span class="row" style="gap:8px">${ico('chat')}<b>코치 피드백</b></span>
          <span class="small muted">코치 · 대상자 · 유형 · 내용 · 작성일</span>
          <button class="btn sm block" onclick="expFeedback()">${ico('dl')} CSV 내보내기</button>
        </div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-h">${ico('clock')}<h3>최근 생성한 리포트</h3></div>
    <div class="tbl-wrap">
      <table class="tbl">
        <thead><tr><th>리포트명</th><th>유형</th><th>생성자</th><th>생성일</th><th class="tc">형식</th><th class="tc">다운로드</th></tr></thead>
        <tbody id="hist"></tbody>
      </table>
    </div>
  </div>`;

  bindMask();
  $$('#rgrid .rcard').forEach(b => b.onclick = () => {
    type = b.dataset.k;
    $$('#rgrid .rcard').forEach(x => x.classList.toggle('on', x === b));
  });
  $('#rScope').onchange = e => {
    const t = $('#rTarget');
    if(e.target.value === 'all'){ t.disabled = true; t.innerHTML = '<option>전체 대상자</option>'; }
    else if(e.target.value === 'grp'){ t.disabled = false; t.innerHTML = ['1조','2조','3조'].map(g => `<option>${g}</option>`).join(''); }
    else { t.disabled = false; t.innerHTML = USERS.filter(x => x.role === 'member').map(m => `<option>${esc(m.name)}</option>`).join(''); }
  };
  $('#genBtn').onclick = generate;
  hist();
}

function hist(){
  $('#hist').innerHTML = HIST.map(h => `<tr>
    <td class="nm">${esc(h.n)}</td>
    <td><span class="badge brand">${esc(h.t)}</span></td>
    <td>${esc(h.by)}</td>
    <td class="muted small">${esc(h.at)}</td>
    <td class="tc">${h.f === 'PDF' ? '<span class="badge danger">PDF</span>' : '<span class="badge ok">Excel</span>'}</td>
    <td class="tc"><button class="btn sm" onclick="${h.f === 'PDF' ? 'downloadPDF()' : `expReport('${esc(h.n)}')`}">${ico('dl')} 받기</button></td>
  </tr>`).join('');
}

function generate(){
  const t = TYPES.find(x => x.k === type);
  const p = PROJECTS.find(x => x.id === $('#rProj').value);
  const items = $$('.ck').filter(c => c.checked).map(c => c.value);
  if(!items.length){ toast('포함 항목을 1개 이상 선택하세요.', true); return; }
  const fmt = $$('input[name=fmt]').find(r => r.checked).value;
  const scope = $('#rScope').value === 'all' ? '전체' : $('#rTarget').value;
  const from = $('#rFrom').value, to = $('#rTo').value;

  $('#prevWrap').innerHTML = `<div class="card mb20"><div class="card-b" style="padding:48px 20px;text-align:center">
    <div class="spin"></div><b>리포트를 생성하고 있습니다…</b>
    <div class="hint mt8">${esc(t.n)} · ${esc(p.name)}</div>
  </div></div>`;
  $('#prevWrap').scrollIntoView({ behavior:'smooth', block:'center' });

  setTimeout(() => {
    $('#prevWrap').innerHTML = `
    <div class="card mb20" id="prev">
      <div class="card-h">${ico('doc')}<h3>리포트 미리보기</h3><span class="spacer"></span>
        <button class="btn sm no-print" onclick="downloadPDF()">${ico('dl')} PDF 다운로드</button>
        <button class="btn pri sm no-print" onclick="expReport('${esc(t.n)}')">${ico('dl')} Excel 다운로드</button>
      </div>
      <div class="card-b">
        <div class="cover">
          <h3>${esc(t.n)}</h3>
          <div class="m">${esc(p.name)} · ${esc(p.client)}</div>
          <div class="m">기간 ${esc(from)} ~ ${esc(to)} · 대상 ${esc(scope)} · 생성자 ${esc(u.name)}</div>
          <div class="tags">${items.map(i => `<span>${esc(i)}</span>`).join('')}<span>${esc(fmt)}</span></div>
        </div>

        <div class="kpis mb20">
          <div class="kpi"><span class="ico" style="background:var(--brand-50);color:var(--brand)">${ico('users')}</span>
            <span class="col"><span class="t">참여 대상자</span><span class="v num">${p.members}<small>명</small></span><span class="d">그룹 ${p.groups}개</span></span></div>
          <div class="kpi"><span class="ico" style="background:var(--ok-bg);color:var(--ok)">${ico('checkbox')}</span>
            <span class="col"><span class="t">체크인율</span><span class="v num">${p.checkin}<small>%</small></span><span class="d">기간 평균</span></span></div>
          <div class="kpi"><span class="ico" style="background:var(--info-bg);color:var(--info)">${ico('chat')}</span>
            <span class="col"><span class="t">피드백 작성률</span><span class="v num">${p.feedback}<small>%</small></span><span class="d">코치 ${p.coaches.length}명</span></span></div>
          <div class="kpi"><span class="ico" style="background:var(--warn-bg);color:var(--warn)">${ico('chart')}</span>
            <span class="col"><span class="t">평균 진척도</span><span class="v num">${p.progress}<small>%</small></span><span class="d">세션 ${p.done}/${p.sessions}회</span></span></div>
        </div>

        <div class="grid g2 mb20">
          <div class="card"><div class="card-h">${ico('chart')}<h3>주차별 추이</h3></div>
            <div class="card-b"><div id="cLine"></div></div></div>
          <div class="card"><div class="card-h">${ico('bars')}<h3>코칭목표 TOP 6</h3></div>
            <div class="card-b"><div id="cBar"></div></div></div>
        </div>

        <div class="sec-t">${ico('doc')} 요약 테이블</div>
        <div class="tbl-wrap">
          <table class="tbl">
            <thead><tr><th>구분</th><th class="tc">대상</th><th class="tc">목표 확정</th><th class="tc">체크인율</th><th class="tc">피드백률</th><th>진척도</th></tr></thead>
            <tbody>
              ${['1조','2조','3조'].slice(0, p.groups).map((g, i) => {
                const pr = Math.max(10, Math.min(100, p.progress + (i-1)*8));
                return `<tr>
                  <td class="nm">${g}</td>
                  <td class="tc num">${Math.round(p.members / p.groups)}명</td>
                  <td class="tc num">${Math.min(100, p.progress + 25)}%</td>
                  <td class="tc num">${Math.max(5, p.checkin + (i-1)*5)}%</td>
                  <td class="tc num">${Math.max(5, p.feedback + (i-1)*4)}%</td>
                  <td><span class="pcell"><b class="num">${pr}%</b><span class="pbar ${pr>=70?'ok':pr>=40?'':'warn'}"><i style="width:${pr}%"></i></span></span></td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>
        </div>

        <div class="insight mt20" style="margin-bottom:0">
          <div class="ih">${ico('bulb')} 요약 인사이트</div>
          <ul>
            <li>기간 내 체크인율이 ${p.checkin}%로 집계되었으며, 최근 2주 연속 상승했습니다.</li>
            <li>코칭목표는 <b>의사소통 강화</b>가 28%로 가장 많았습니다.</li>
            <li>피드백 미작성 건은 주간 리마인드 발송으로 개선할 수 있습니다.</li>
          </ul>
        </div>
      </div>
    </div>`;

    line('#cLine', { labels:ANALYTICS.trend.labels, series:[
      { n:'체크인율', data:ANALYTICS.trend.checkin, c:'#5B4BE8' },
      { n:'진행률',   data:ANALYTICS.trend.progress, c:'#14B8A6' },
    ]});
    hbar('#cBar', ANALYTICS.topGoals.slice(0,6), { labelW:118, color:'#5B4BE8' });

    HIST.unshift({ n:p.name + ' — ' + t.n, t:t.n.replace(' 리포트',''), by:u.name, at:new Date().toISOString().slice(0,10), f:fmt });
    hist();
    toast('리포트가 생성되었습니다.');
  }, 1200);
}

/* ---------- 데이터 내보내기 (실제 CSV) ---------- */
const pname = id => (PROJECTS.find(p => p.id === id) || {name:'-'}).name;
function expMembers(){
  const rows = [['이름','소속','직급','회사메일','프로젝트','그룹','담당코치','목표 진행률(%)']];
  USERS.filter(m => m.role === 'member').forEach((m, i) => rows.push([
    m.name, m.org, m.title, m.email, pname(m.projectId), m.group, uById(m.coachId).name, 40 + ((i*13) % 52),
  ]));
  downloadCSV('대상자목록.csv', rows);
}
function expGoals(){
  const rows = [['대상자','프로젝트','코칭목표','역량','시작점수','목표점수','현재점수','행동지표','주기','실행','목표','상태']];
  GOALS.forEach(g => {
    const m = uById(g.userId);
    g.indicators.forEach(i => rows.push([
      m.name, pname(g.projectId), g.title, g.comp.join(' / '), g.startScore, g.targetScore, g.nowScore,
      i.t, i.freq, i.done, i.total, i.status,
    ]));
  });
  downloadCSV('코칭목표_행동지표.csv', rows);
}
function expCheckins(){
  const rows = [['대상자','주차','실행률(%)','실행한 것','느낀 점','장애물','다음 계획','코치에게 질문','작성일','상태']];
  CHECKINS.forEach(c => {
    const m = uById(c.userId);
    rows.push([m.name, c.week, c.rate, c.done, c.felt, c.blocker, c.next, c.ask, c.at, c.state]);
  });
  downloadCSV('체크인이력.csv', rows);
}
function expFeedback(){
  const rows = [['코치','대상자','유형','작성일시','피드백 내용','다음 액션']];
  FEEDBACKS.forEach(f => rows.push([uById(f.coachId).name, uById(f.userId).name, f.type, f.at, f.body, f.next || '']));
  downloadCSV('코치피드백.csv', rows);
}
function expReport(name){
  const p = PROJECTS.find(x => x.id === ($('#rProj') ? $('#rProj').value : 'p1')) || PROJECTS[0];
  const rows = [
    ['리포트명', name],
    ['프로젝트', p.name], ['고객사', p.client], ['기간', p.start + ' ~ ' + p.end],
    ['생성자', u.name], ['생성일', new Date().toISOString().slice(0,10)], [],
    ['구분','대상(명)','목표 확정(%)','체크인율(%)','피드백률(%)','진척도(%)'],
  ];
  ['1조','2조','3조'].slice(0, p.groups).forEach((g, i) => rows.push([
    g, Math.round(p.members / p.groups), Math.min(100, p.progress + 25),
    Math.max(5, p.checkin + (i-1)*5), Math.max(5, p.feedback + (i-1)*4),
    Math.max(10, Math.min(100, p.progress + (i-1)*8)),
  ]));
  rows.push([], ['주차', ...ANALYTICS.trend.labels]);
  rows.push(['체크인율(%)', ...ANALYTICS.trend.checkin]);
  rows.push(['진행률(%)', ...ANALYTICS.trend.progress]);
  downloadCSV(name.replace(/[\\/:*?"<>|]/g, '_') + '.csv', rows);
}

if(u) render();
