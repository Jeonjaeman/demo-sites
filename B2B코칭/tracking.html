<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>실행 트래킹 | 하우 부스터</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css"/>
<link rel="stylesheet" href="assets/style.css"/>
<style>
/* ===== tracking 전용 ===== */
.hero{background:var(--grad);color:#fff;border-radius:var(--r-xl);padding:22px 26px;display:flex;align-items:center;gap:22px;box-shadow:var(--sh-brand);margin-bottom:16px}
.hero .hl{flex:1;min-width:0}
.hero .htag{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,.18);border-radius:99px;padding:4px 11px;font-size:11.5px;font-weight:800;letter-spacing:.01em}
.hero h2{font-size:27px;letter-spacing:-.03em;margin:9px 0 4px}
.hero p{font-size:13.5px;opacity:.88}
.hero .hst{display:flex;gap:9px;flex-wrap:wrap;margin-top:14px}
.hero .hst span{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.2);border-radius:99px;padding:5px 11px;font-size:12px;font-weight:700}
.hero svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.9}

.sum3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
.sum3 .s{background:#fff;border:1px solid var(--line);border-radius:var(--r);padding:13px 15px;box-shadow:var(--sh-1)}
.sum3 .s .t{font-size:11.5px;color:var(--muted);font-weight:700}
.sum3 .s .v{font-size:20px;font-weight:800;letter-spacing:-.02em;margin-top:2px}
.sum3 .s .v small{font-size:13px;color:var(--muted);font-weight:700}

.act{display:flex;gap:12px;padding:14px;border:1px solid var(--line);border-radius:var(--r);margin-bottom:9px;cursor:pointer;transition:.16s;background:#fff}
.act:hover{border-color:var(--brand-100);background:var(--brand-50);transform:translateY(-1px);box-shadow:var(--sh-2)}
.act .aic{width:38px;height:38px;flex:0 0 38px;border-radius:11px;display:grid;place-items:center;background:var(--brand-50);color:var(--brand)}
.act .aic svg{width:19px;height:19px;stroke:currentColor;fill:none;stroke-width:1.9}
.act .ab{flex:1;min-width:0}
.act b{font-size:14px;display:block;letter-spacing:-.01em}
.act .asub{font-size:12px;color:var(--muted);margin-top:2px}
.act .ameta{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-top:8px}
.act .aprog{display:flex;align-items:center;gap:9px;margin-top:9px}
.act .aprog .pbar{flex:1}
.act .aprog b{font-size:12px;width:38px;text-align:right;flex:0 0 38px}

.rng{-webkit-appearance:none;appearance:none;width:100%;height:6px;border-radius:99px;background:#EDEFF6;outline:none;cursor:pointer;margin:8px 0 2px}
.rng::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:99px;background:var(--brand);border:3px solid #fff;box-shadow:0 2px 8px rgba(91,75,232,.45);cursor:pointer}
.rng::-moz-range-thumb{width:14px;height:14px;border-radius:99px;background:var(--brand);border:3px solid #fff;box-shadow:0 2px 8px rgba(91,75,232,.45);cursor:pointer}
.rng-h{display:flex;align-items:center;justify-content:space-between}
.rng-v{font-size:19px;font-weight:800;color:var(--brand);letter-spacing:-.02em}

.acc{border:1px solid var(--line);border-radius:var(--r);margin-bottom:9px;overflow:hidden;background:#fff}
.acc-h{display:flex;align-items:center;gap:10px;padding:13px 15px;cursor:pointer;transition:.15s}
.acc-h:hover{background:var(--hover)}
.acc-h .ar{margin-left:auto;transition:transform .2s;color:var(--muted-2);display:grid;place-items:center}
.acc-h .ar svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;transform:rotate(90deg)}
.acc.on .acc-h .ar svg{transform:rotate(-90deg)}
.acc-b{display:none;padding:0 15px 15px;border-top:1px solid var(--line-2)}
.acc.on .acc-b{display:block}
.qa{margin-top:12px}
.qa .ql{font-size:11.5px;font-weight:800;color:var(--brand-700);margin-bottom:3px}
.qa .qb{font-size:13px;color:var(--ink-2);line-height:1.65;background:#FAFAFE;border:1px solid var(--line-2);border-radius:10px;padding:9px 11px}

.fb{display:flex;gap:10px;padding:12px 0;border-bottom:1px solid var(--line-2)}
.fb:last-child{border-bottom:0}
.fb .fbb{flex:1;min-width:0}
.fb .fbt{font-size:12.8px;color:var(--ink-2);line-height:1.6;margin-top:3px}
.fb-box{background:var(--brand-50);border:1px solid var(--brand-100);border-radius:12px;padding:12px 13px;margin-top:12px}
.fb-box .fh{display:flex;align-items:center;gap:8px;margin-bottom:7px}

.cin{display:flex;align-items:center;gap:9px;padding:11px 0;border-bottom:1px solid var(--line-2)}
.cin:last-child{border-bottom:0}
.ttl-r{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted)}
@media(max-width:900px){
  .hero{flex-direction:column;align-items:flex-start;padding:20px}
  .sum3{grid-template-columns:1fr}
  .hero h2{font-size:23px}
}
</style>
</head>
<body>
<script src="assets/data.js"></script>
<script src="assets/app.js"></script>
<script src="assets/charts.js"></script>
<script>
/* ============================================================
   실행 트래킹 · 주간 체크인
   ============================================================ */
const u = shell('tracking');
const role = u ? session().role : null;

/* ---------- 상태 ---------- */
const S = { mid:'m1', acts:[], checks:[], filter:'전체', msgTo:null, msgType:'리마인드' };

/* ---------- 코치 화면용 데이터 (담당 피코치 실행과제 현황) ---------- */
const COACHROWS = [
  { uid:'m1', act:'주 1회 팀원 1:1 진행하기',       cat:'리더십',       due:'2024-05-28', st:'진행 중', rate:72, ci:'제출', ciAt:'2024-05-26', fb:true  },
  { uid:'m2', act:'핵심 이해관계자 주간 업데이트',   cat:'커뮤니케이션', due:'2024-05-24', st:'지연',   rate:48, ci:'미제출', ciAt:'2024-05-12', fb:false },
  { uid:'m3', act:'피드백 대화 2회 실행',            cat:'팀 관리',      due:'2024-05-27', st:'완료',   rate:85, ci:'제출', ciAt:'2024-05-25', fb:true  },
  { uid:'m4', act:'회의 전 아젠다·기대결과 공유',     cat:'커뮤니케이션', due:'2024-05-29', st:'진행 중', rate:60, ci:'제출', ciAt:'2024-05-26', fb:false },
  { uid:'m5', act:'분기 전략 로드맵 구성원 공유',     cat:'전략 실행',    due:'2024-05-23', st:'지연',   rate:35, ci:'미제출', ciAt:'2024-05-11', fb:false },
  { uid:'m6', act:'위임 과제 점검 및 코칭 질문 활용', cat:'팀 관리',      due:'2024-06-04', st:'예정',   rate:52, ci:'제출', ciAt:'2024-05-26', fb:true  },
  { uid:'m7', act:'우선순위 매트릭스 주간 점검',      cat:'전략 실행',    due:'2024-06-05', st:'예정',   rate:44, ci:'제출', ciAt:'2024-05-25', fb:false },
];
/* ---------- PM/HR 화면용 미제출자 ---------- */
const LATE = [
  { n:'정민호', o:'A기업 · 개발팀 팀장',   p:'2024 리더십 코칭 1기', c:'박코치', last:'2024-05-11', miss:2, st:'2주 미제출' },
  { n:'오세훈', o:'B그룹 · 재무팀 과장',   p:'핵심인재 성장 코칭 2기', c:'최코치', last:'2024-05-18', miss:1, st:'1주 미제출' },
  { n:'강하나', o:'C회사 · CS팀 팀장',     p:'팀장 역량 강화 코칭',   c:'박코치', last:'2024-05-05', miss:3, st:'장기 미제출' },
  { n:'이도윤', o:'A기업 · 영업1팀 파트장', p:'2024 리더십 코칭 1기', c:'김코치', last:'2024-05-19', miss:1, st:'1주 미제출' },
  { n:'한소영', o:'B그룹 · 전략기획 차장', p:'핵심인재 성장 코칭 2기', c:'이코치', last:'2024-05-12', miss:2, st:'2주 미제출' },
];

const stBadge = s => s==='완료' ? 'ok' : s==='진행'||s==='진행 중' ? 'info' : s==='지연' ? 'danger' : s==='예정' ? 'brand' : 'gray';
const goalRate = g => Math.round(g.indicators.reduce((a,b)=>a+b.done,0) / g.indicators.reduce((a,b)=>a+b.total,0) * 100);

if(u){
  S.mid = ACTIONS.some(a => a.userId === u.id) ? u.id : 'm1';
  S.acts = ACTIONS.filter(a => a.userId === S.mid).map(a => Object.assign({}, a));
  S.checks = CHECKINS.filter(c => c.userId === S.mid && c.state === '완료').map(c => Object.assign({}, c)).reverse();

  if(role === 'member')      renderMember();
  else if(role === 'coach')  renderCoach();
  else                       renderPM();
  bindMask();
}

/* ============================================================
   1) 코칭 대상자 (member)
   ============================================================ */
function renderMember(){
  const feeds = FEEDBACKS.filter(f => f.userId === S.mid);
  const goals = GOALS.filter(g => g.userId === S.mid);

  $('#page').innerHTML = `
  <div class="hero">
    <div class="hl">
      <span class="htag">${ico('cal')} 체크인 기간 2024.05.27 ~ 06.02</span>
      <h2>이번 주 실행률 72%</h2>
      <p>꾸준히 실행 중입니다! 계속 유지해요.</p>
      <div class="hst">
        <span>연속 체크인 5주</span><span>실행과제 ${S.acts.length}개</span><span>담당 코치 ${esc(uById(USERS.find(x=>x.id===S.mid).coachId||'c1').name)}</span>
      </div>
    </div>
    <div id="heroRing"></div>
  </div>

  <div class="sum3">
    <div class="s"><div class="t">이번 주 완료</div><div class="v">8 <small>/ 11</small></div></div>
    <div class="s"><div class="t">진행 중</div><div class="v">2 <small>건</small></div></div>
    <div class="s"><div class="t">다음 체크인</div><div class="v">5/30 <small>(목)</small></div></div>
  </div>

  <div class="grid g-2-1">
    <div>
      <!-- 실행과제 -->
      <div class="card mb16">
        <div class="card-h">${ico('target')}<h3>실행과제</h3><span class="spacer"></span><span class="hint">클릭하면 상세와 코치 피드백을 볼 수 있습니다</span></div>
        <div class="card-b" id="actList"></div>
      </div>

      <!-- 주간 체크인 작성 -->
      <div class="card mb16" id="ciCard">
        <div class="card-h">${ico('checkbox')}<h3>주간 체크인 작성</h3><span class="spacer"></span><span class="badge warn">마감 D-2</span></div>
        <div class="card-b">
          <div class="field">
            <label>체크인 기간</label>
            <div class="row" style="gap:8px">
              <input class="inp" value="2024.05.27 ~ 06.02" readonly style="max-width:220px;background:#FAFAFE"/>
              <span class="pill">6주차</span>
            </div>
          </div>
          <div class="field">
            <div class="rng-h"><label style="margin:0">이번 주 진행률<span class="req">*</span></label><span class="rng-v" id="ciRateV">72%</span></div>
            <input type="range" class="rng" id="ciRate" min="0" max="100" value="72"/>
            <div class="row" style="justify-content:space-between"><small class="muted">0%</small><small class="muted">100%</small></div>
          </div>
          <div class="field">
            <label>이번 주 실행한 내용<span class="req">*</span></label>
            <textarea class="inp ta" id="ciDone" maxlength="500" placeholder="이번 주에 실제로 실행한 행동을 구체적으로 적어주세요."></textarea>
            <div class="inp-cnt"><span id="cDone">0</span>/500</div>
          </div>
          <div class="field">
            <label>장애 요인</label>
            <textarea class="inp ta" id="ciBlock" maxlength="500" placeholder="실행을 어렵게 만든 요인이 있었나요?"></textarea>
            <div class="inp-cnt"><span id="cBlock">0</span>/500</div>
          </div>
          <div class="field">
            <label>다음 주 실행 계획</label>
            <textarea class="inp ta" id="ciNext" maxlength="500" placeholder="다음 주에 실행할 행동을 적어주세요."></textarea>
            <div class="inp-cnt"><span id="cNext">0</span>/500</div>
          </div>
          <div class="field" style="margin-bottom:6px">
            <label>코치에게 궁금한 점</label>
            <textarea class="inp ta" id="ciAsk" maxlength="500" placeholder="코치에게 묻고 싶은 질문을 남겨주세요."></textarea>
            <div class="inp-cnt"><span id="cAsk">0</span>/500</div>
          </div>
        </div>
        <div class="card-f">
          <span class="hint">저장 시 담당 코치에게 알림이 발송됩니다.</span>
          <span class="spacer" style="flex:1"></span>
          <button class="btn" onclick="toast('임시 저장되었습니다.')">임시 저장</button>
          <button class="btn pri" onclick="saveCheckin()">${ico('check')} 체크인 저장</button>
        </div>
      </div>

      <!-- 지난 체크인 -->
      <div class="card">
        <div class="card-h">${ico('clock')}<h3>지난 체크인</h3><span class="spacer"></span><span class="badge gray" id="ckCnt">${S.checks.length}건</span></div>
        <div class="card-b" id="ckList"></div>
      </div>
    </div>

    <div>
      <!-- 코치 리마인드 / 피드백 -->
      <div class="card mb16">
        <div class="card-h">${ico('chat')}<h3>코치 피드백 · 리마인드</h3></div>
        <div class="card-b" style="padding-top:6px">
          ${feeds.map(f => {
            const c = uById(f.coachId);
            return `<div class="fb">
              ${avatar(c,'sm')}
              <div class="fbb">
                <div class="row" style="gap:6px"><b style="font-size:13px">${esc(c.name)}</b><span class="badge brand">${esc(f.type)}</span><small class="muted" style="margin-left:auto">${esc(f.at.slice(5,10))}</small></div>
                <div class="fbt">${esc(f.body)}</div>
                <div class="row mt8" style="gap:6px"><span class="pill">다음 주제 · ${esc(f.next)}</span></div>
              </div>
            </div>`;
          }).join('')}
          <button class="btn soft block mt12" onclick="location.href='booster.html'">${ico('zap')} 부스터에서 답변하기</button>
        </div>
      </div>

      <!-- 내 코칭목표 -->
      <div class="card">
        <div class="card-h">${ico('target')}<h3>내 코칭목표</h3><span class="spacer"></span><a class="btn sm ghost" href="goal.html">전체보기 ${ico('arrow')}</a></div>
        <div class="card-b" style="padding-top:8px">
          ${goals.map(g => {
            const r = goalRate(g);
            return `<div style="padding:10px 0;border-bottom:1px solid var(--line-2)">
              <div class="row between"><b style="font-size:13.5px">${esc(g.title)}</b><b style="font-size:12.5px;color:var(--brand)">${r}%</b></div>
              <div class="row mt8" style="gap:6px">${g.comp.map(c=>`<span class="pill">${esc(c)}</span>`).join('')}</div>
              <div class="pbar mt8"><i style="width:${r}%"></i></div>
              <small class="muted">행동지표 ${g.indicators.length}개 · 목표 ${g.targetScore}점 / 현재 ${g.nowScore}점</small>
            </div>`;
          }).join('')}
          <div class="insight mt12" style="margin-bottom:0">
            <div class="ih">${ico('bulb')} 코치 한마디</div>
            <ul><li>진행률이 4주 연속 상승했습니다. 1:1 준비 시간을 캘린더에 블로킹해 보세요.</li></ul>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 실행과제 상세 모달 -->
  <div class="mask" id="actM">
    <div class="modal wide">
      <div class="modal-h"><h3 id="amT">실행과제 상세</h3><button class="x" onclick="closeM('actM')">${ico('x')}</button></div>
      <div class="modal-b" id="amB"></div>
      <div class="modal-f">
        <button class="btn" onclick="closeM('actM')">닫기</button>
        <button class="btn pri" onclick="saveProgress()">${ico('check')} 진행상황 업데이트</button>
      </div>
    </div>
  </div>`;

  ring('#heroRing', 72, { size:92, color:'#fff', track:'rgba(255,255,255,.28)', sub:'이번 주' });
  drawActs(); drawChecks();

  ['Done','Block','Next','Ask'].forEach(k => {
    const ta = $('#ci'+k), cn = $('#c'+k);
    ta.addEventListener('input', () => { cn.textContent = ta.value.length; });
  });
  const r = $('#ciRate');
  r.addEventListener('input', () => { $('#ciRateV').textContent = r.value + '%'; });
  bindMask();
}

function drawActs(){
  $('#actList').innerHTML = S.acts.map(a => `
    <div class="act" onclick="openAct('${a.id}')">
      <span class="aic">${ico(a.icon)}</span>
      <div class="ab">
        <div class="row between"><b>${esc(a.t)}</b><span class="badge ${stBadge(a.status)}">${esc(a.status)}</span></div>
        <div class="asub">${esc(a.sub)}</div>
        <div class="ameta">
          <span class="pill">${esc(a.comp)}</span>
          <span class="ttl-r">${ico('checkbox')} 이번 주: ${esc(a.week)} (${a.progress===100?'완료':a.progress===0?'대기':'진행 중'})</span>
          <span class="ttl-r">${ico('cal')} ${esc(a.due.slice(5))}</span>
        </div>
        <div class="aprog">
          <span class="pbar ${a.progress===100?'ok':a.progress===0?'warn':''}"><i style="width:${a.progress}%"></i></span>
          <b>${a.progress}%</b>
        </div>
      </div>
    </div>`).join('');
}

function openAct(id){
  const a = S.acts.find(x => x.id === id); if(!a) return;
  S.cur = id;
  const fb = FEEDBACKS.filter(f => f.userId === S.mid)[0];
  const c  = uById(fb ? fb.coachId : 'c1');
  $('#amT').textContent = a.t;
  $('#amB').innerHTML = `
    <div class="row between mb12">
      <div class="row" style="gap:10px">
        <span class="aic" style="width:40px;height:40px;flex:0 0 40px;border-radius:12px;display:grid;place-items:center;background:var(--brand-50);color:var(--brand)">${ico(a.icon)}</span>
        <div class="col"><b style="font-size:15px">${esc(a.t)}</b><small class="muted">${esc(a.sub)}</small></div>
      </div>
      <span class="badge ${stBadge(a.status)}">${esc(a.status)}</span>
    </div>

    <div class="row between" style="align-items:center;gap:10px;background:#FAFAFE;border:1px solid var(--line-2);border-radius:12px;padding:12px 14px">
      <div style="flex:1"><small class="muted">진행률</small><div class="pbar mt8" style="height:8px"><i style="width:${a.progress}%"></i></div></div>
      <b style="font-size:22px;color:var(--brand);letter-spacing:-.02em">${a.progress}%</b>
    </div>

    <div class="f-row c2 mt16">
      <div class="field"><label>마감일</label><div class="inp" style="background:#FAFAFE">${esc(a.due.slice(5).replace('-','/'))} (${['일','월','화','수','목','금','토'][new Date(a.due).getDay()]})</div></div>
      <div class="field"><label>우선순위</label><div class="inp" style="background:#FAFAFE;color:${a.priority==='높음'?'var(--danger)':'var(--ink)'};font-weight:800">${esc(a.priority)}</div></div>
    </div>
    <div class="f-row c2">

function saveCheckin(){

  S.checks.unshift({
    id:'ck' + (Date.now()), userId:S.mid, week:'2024-05-27 ~ 06-02', rate:+$('#ciRate').value,
    done, blocker:$('#ciBlock').value.trim(), next:$('#ciNext').value.trim(), ask:$('#ciAsk').value.trim(),
    at:'2024-05-30', state:'완료', fbBody:null,
  });
  ['Done','Block','Next','Ask'].forEach(k => { $('#ci'+k).value = ''; $('#c'+k).textContent = '0'; });
  drawChecks();
  toast('체크인이 저장되었습니다. 담당 코치에게 알림이 발송됩니다.');

            <li>체크인 미제출자 35명에게 리마인드 알림이 발송됩니다.</li>
            <li>담당 코치에게도 미제출 현황이 함께 공유됩니다.</li>
          </ul>
        </div>
        <div class="field mt12">
          <label>발송 채널</label>
          <div class="radio-row" style="gap:18px">
            <label><input type="checkbox" checked/> 앱 알림</label>
            <label><input type="checkbox" checked/> 이메일</label>
            <label><input type="checkbox"/> 카카오 알림톡</label>
          </div>
        </div>
        <div class="field" style="margin-bottom:0">
          <label>메시지</label>
          <textarea class="inp" id="remBody" maxlength="500" style="min-height:90px">이번 주 실행 체크인이 아직 제출되지 않았습니다. 5월 30일(목)까지 작성해 주세요.</textarea>
        </div>
      </div>
      <div class="modal-f">
        <button class="btn" onclick="closeM('remM')">취소</button>
        <button class="btn pri" onclick="sendRemind()">${ico('send')} 35명에게 발송</button>
      </div>
    </div>
  </div>`;

  line('#trend', { labels:ANALYTICS.trend.labels, series:[
    { n:'체크인율(%)', data:ANALYTICS.trend.checkin,  c:'#5B4BE8' },
    { n:'평균 진행률(%)', data:ANALYTICS.trend.progress, c:'#14B8A6' },
  ]});
  hbar('#pbars', PROJECTS.filter(p => p.status !== '준비중').map(p => [p.name.length > 12 ? p.name.slice(0,12) + '…' : p.name, p.checkin, null]),
    { color:'#5B4BE8', labelW:104, showPct:false });
  bindMask();
}
function toggleAll(el){ $$('.lchk').forEach(c => { c.checked = el.checked; }); }
function sendRemind(){ closeM('remM'); toast('35명에게 리마인드를 발송했습니다.'); }
function expLate(){
  downloadCSV('체크인_미제출자.csv', [
    ['이름','소속','프로젝트','담당코치','최근 체크인','미제출 주차','상태'],
    ...LATE.map(r => [r.n, r.o, r.p, r.c, r.last, r.miss + '주', r.st]),
  ]);
}
</script>
</body>
