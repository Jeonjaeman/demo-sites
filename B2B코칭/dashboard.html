<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>대시보드 | 하우 부스터</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<link rel="stylesheet" href="assets/style.css" />
<style>
  .hero-c{background:var(--grad);border-radius:var(--r-lg);padding:22px 24px;color:#fff;display:flex;align-items:center;gap:22px;box-shadow:var(--sh-brand)}
  .hero-c .col{flex:1;min-width:0}
  .hero-c h2{font-size:19px;letter-spacing:-.02em;margin-bottom:4px}
  .hero-c p{opacity:.9;font-size:13px;line-height:1.6}
  .hero-c .kv{display:flex;gap:20px;margin-top:14px;padding-top:14px;border-top:1px solid rgba(255,255,255,.22)}
  .hero-c .kv b{display:block;font-size:17px}
  .hero-c .kv small{opacity:.82;font-size:11px}
  .todo{display:flex;align-items:center;gap:11px;padding:11px 12px;border:1px solid var(--line);border-radius:12px;margin-bottom:8px;transition:.15s}
  .todo:hover{border-color:var(--brand-100);background:var(--brand-50)}
  .todo .ic{width:32px;height:32px;border-radius:10px;display:grid;place-items:center;flex:0 0 32px}
  .todo .ic svg{width:15px;height:15px;stroke-width:2;fill:none}
  .goal-c{border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:10px}
  .goal-c .t{font-weight:700;font-size:14px;margin-bottom:8px;line-height:1.45}
  .score{display:flex;align-items:center;gap:8px;margin-top:10px}
  .score .s{flex:1;text-align:center;border:1px solid var(--line);border-radius:10px;padding:7px 4px}
  .score .s b{display:block;font-size:15px}
  .score .s small{font-size:10px;color:var(--muted)}
  .score .s.fin{background:#FEF9E7;border-color:#F5E0A3}
  @media(max-width:900px){ .hero-c{flex-direction:column;align-items:flex-start;gap:14px} }
</style>
</head>
<body>
<script src="assets/data.js"></script>
<script src="assets/app.js"></script>
<script src="assets/charts.js"></script>
<script>
const u = shell('dashboard');
if(u){
  const role = session().role;
  const P = $('#page');

  /* ---------------- 관리자 / PM ---------------- */
  if(role === 'admin' || role === 'pm'){
    const list = role === 'pm' ? PROJECTS.filter(p => p.pm === u.name) : PROJECTS;
    const active = list.filter(p => p.status === '진행중').length;
    P.innerHTML = `
      <div class="kpis mb16">
        ${kpi('folder','#EEF0FF','#5B4BE8','전체 프로젝트', list.length, '개', `진행중 ${active} · 완료 ${list.filter(p=>p.status==='완료').length}`)}
        ${kpi('users','#E7F7EE','#16A34A','전체 대상자', TOTALS.members, '명', `진행 ${TOTALS.active} · 준비중 ${TOTALS.waiting}`)}
        ${kpi('chart','#E8F1FE','#3B82F6','이번 주 체크인율', TOTALS.checkin, '%', '지난 주 대비 <span class="up">▲ 8%p</span>')}
        ${kpi('chat','#FEF3E2','#F59E0B','코치 피드백률', TOTALS.feedback, '%', '지난 주 대비 <span class="up">▲ 5%p</span>')}
        ${kpi('target','#FDECEC','#EF4444','평균 진척도', TOTALS.progress, '%', '목표 대비 평균')}
      </div>

      <div class="grid g-2-1 mb16">
        <div class="card">
          <div class="card-h">
            <h3>프로젝트 진행 현황</h3><span class="spacer"></span>
            <a class="btn sm" href="projects.html">전체 보기 →</a>
          </div>
          <div class="tbl-wrap">
            <table class="tbl">
              <thead><tr><th>프로젝트명</th><th>고객사</th><th>기간</th><th>대상자</th><th>진행률</th><th>체크인율</th><th>상태</th><th>담당</th></tr></thead>
              <tbody>${list.map(p => `<tr onclick="location.href='project.html?id=${p.id}'" style="cursor:pointer">
                <td><div class="nm">${esc(p.name)}</div><div class="sub">그룹 ${p.groups}개 · ${esc(p.type)}</div></td>
                <td>${esc(p.client)}</td>
                <td class="num small">${p.start}<br/>~ ${p.end}</td>
                <td class="num">${p.members}명</td>
                <td><div class="pcell"><b class="num">${p.progress}%</b><span class="pbar ${p.progress>=80?'ok':''}"><i style="width:${p.progress}%"></i></span></div></td>
                <td class="num">${p.checkin}%</td>
                <td>${stBadge(p.status)}</td>
                <td>${esc(p.pm)}</td>
              </tr>`).join('')}</tbody>
            </table>
          </div>
        </div>

        <div class="col" style="gap:16px">
          <div class="card">
            <div class="card-h"><h3>주간 체크인 · 실행 추이</h3></div>
            <div class="card-b"><div id="ch-trend"></div></div>
          </div>
          <div class="card">
            <div class="card-h"><h3>상태별 프로젝트</h3></div>
            <div class="card-b row" style="gap:16px">
              <div id="ch-status" style="flex:0 0 auto"></div>
              <div class="col" style="flex:1;gap:8px">
                ${lg('#16A34A','진행중', active, Math.round(active/list.length*100))}
                ${lg('#3B82F6','준비중', list.filter(p=>p.status==='준비중').length, Math.round(list.filter(p=>p.status==='준비중').length/list.length*100))}
                ${lg('#C9CDDC','완료', list.filter(p=>p.status==='완료').length, Math.round(list.filter(p=>p.status==='완료').length/list.length*100))}
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="grid g3">
        <div class="card">
          <div class="card-h"><h3>이번 주 체크인 현황</h3><span class="spacer"></span><span class="badge warn">미완료 ${TOTALS.notCheckedIn}명</span></div>
          <div class="card-b">
            <div class="li"><span class="av sm" style="background:#EEF0FF;color:#5B4BE8">${ico('users')}</span><span class="col"><b>대상 인원</b><small>진행 중 프로젝트 기준</small></span><b class="num">${TOTALS.active}명</b></div>
            <div class="li"><span class="av sm" style="background:#E7F7EE;color:#16A34A">${ico('check')}</span><span class="col"><b>체크인 완료</b></span><b class="num">${TOTALS.checkedIn}명 (${TOTALS.checkin}%)</b></div>
            <div class="li"><span class="av sm" style="background:#FEF3E2;color:#F59E0B">${ico('bell')}</span><span class="col"><b>체크인 미완료</b></span><b class="num">${TOTALS.notCheckedIn}명 (${100-TOTALS.checkin}%)</b></div>
            <button class="btn soft block mt12" onclick="toast('미제출자 ${TOTALS.notCheckedIn}명에게 리마인드를 발송했습니다.')">${ico('send')} 일괄 리마인드 발송</button>
          </div>
        </div>

        <div class="card">
          <div class="card-h"><h3>코치별 담당 현황</h3><span class="spacer"></span><a class="btn ghost sm" href="coaches.html">더보기 →</a></div>
          <div class="card-b">
            ${USERS.filter(x=>x.role==='coach').map(c => `<div class="li">
              ${avatar(c,'sm')}
              <span class="col"><b>${esc(c.name)}</b><small>${esc(c.title)}</small></span>
              <span class="tr"><b class="num" style="font-size:13px">${c.load}명</b><small class="muted" style="display:block;font-size:11px">2개 프로젝트</small></span>
            </div>`).join('')}
          </div>
        </div>

        <div class="card">
          <div class="card-h"><h3>최근 활동</h3></div>
          <div class="card-b">
            <div class="tl">
              <div class="tl-i"><b>이도윤 대상자 체크인 작성</b><small>2024-05-26 · 2024 리더십 코칭 1기</small></div>
              <div class="tl-i"><b>김코치 피드백 작성</b><small>2024-05-26 · 김지연 대상자</small></div>
              <div class="tl-i gray"><b>박서준 대상자 체크인 작성</b><small>2024-05-25 · 2024 리더십 코칭 1기</small></div>
              <div class="tl-i gray"><b>코칭목표합의서 제출 (2건)</b><small>2024-05-24 · 핵심인재 성장 코칭 2기</small></div>
            </div>
          </div>
        </div>
      </div>`;

    line('#ch-trend', { labels: ANALYTICS.trend.labels, series:[
      { n:'체크인율(%)', data: ANALYTICS.trend.checkin, c:'#3B82F6' },
      { n:'평균 진행률(%)', data: ANALYTICS.trend.progress, c:'#5B4BE8' },
    ]});
    donut('#ch-status', [
      { n:'진행중', v:active, c:'#16A34A' },
      { n:'준비중', v:list.filter(p=>p.status==='준비중').length, c:'#3B82F6' },
      { n:'완료',   v:list.filter(p=>p.status==='완료').length,  c:'#C9CDDC' },
    ], '전체', list.length + '개');
  }

  /* ---------------- 파트너 코치 ---------------- */
  else if(role === 'coach'){
    const mine = USERS.filter(x => x.role === 'member' && x.coachId === u.id);
    P.innerHTML = `
      <div class="hero-c mb16">
        <div class="col">
          <h2>${esc(u.name)}님, 이번 주 담당 피코치 현황입니다.</h2>
          <p>피드백 작성이 필요한 피코치가 <b>4명</b> 있습니다. 체크인 마감은 <b>5/30(목)</b>입니다.</p>
          <div class="kv">
            <div><b class="num">12명</b><small>전체 피코치</small></div>
            <div><b class="num">8명 (67%)</b><small>이번 주 체크인 완료</small></div>
            <div><b class="num">4명</b><small>피드백 작성 필요</small></div>
            <div><b class="num">2건</b><small>부스터 응답 도착</small></div>
          </div>
        </div>
        <div id="ring-coach"></div>
      </div>

      <div class="grid g-2-1">
        <div class="card">
          <div class="card-h"><h3>담당 피코치</h3><span class="spacer"></span><a class="btn sm" href="members.html">전체 보기 →</a></div>
          <div class="tbl-wrap">
            <table class="tbl">
              <thead><tr><th>피코치</th><th>코칭목표</th><th>진척도</th><th>이번 주 체크인</th><th>피드백</th><th></th></tr></thead>
              <tbody>${mine.concat(USERS.filter(x=>x.role==='member').slice(0,3)).slice(0,6).map((m,i) => {
                const done = i % 3 !== 2;
                return `<tr>
                  <td><div class="row">${avatar(m,'sm')}<span class="col"><b>${esc(m.name)}</b><small class="sub">${esc(m.title)}</small></span></div></td>
                  <td class="small">${i%2 ? '리더십 역량 강화' : '효과적인 의사소통 역량 강화'}</td>
                  <td><div class="pcell"><b class="num">${[72,60,45,66,80,55][i]}%</b><span class="pbar"><i style="width:${[72,60,45,66,80,55][i]}%"></i></span></div></td>
                  <td>${done ? '<span class="badge ok dot">완료</span>' : '<span class="badge warn dot">미완료</span>'}</td>
                  <td>${done ? '<span class="badge danger">미작성</span>' : '<span class="badge gray">대기</span>'}</td>
                  <td class="tr"><a class="btn sm pri" href="booster.html">피드백 작성</a></td>
                </tr>`;
              }).join('')}</tbody>
            </table>
          </div>
        </div>

        <div class="col" style="gap:16px">
          <div class="card">
            <div class="card-h"><h3>오늘 할 일</h3><span class="spacer"></span><span class="badge brand">4건</span></div>
            <div class="card-b">
              <a class="todo" href="booster.html"><span class="ic" style="background:#FDECEC;color:#EF4444">${ico('chat')}</span><span class="col"><b>피드백 미작성 4건</b><small class="muted">체크인 제출자 대상</small></span>${ico('arrow','')}</a>
              <a class="todo" href="coachlog.html"><span class="ic" style="background:#EEF0FF;color:#5B4BE8">${ico('doc')}</span><span class="col"><b>코칭로그 작성 2건</b><small class="muted">5/24 세션 · 김지연 외 1명</small></span>${ico('arrow','')}</a>
              <a class="todo" href="booster.html"><span class="ic" style="background:#F3ECFE;color:#8B5CF6">${ico('zap')}</span><span class="col"><b>부스터 응답 확인 2건</b><small class="muted">김지연 · 이도윤</small></span>${ico('arrow','')}</a>
              <a class="todo" href="tracking.html"><span class="ic" style="background:#FEF3E2;color:#F59E0B">${ico('bell')}</span><span class="col"><b>체크인 리마인드 4명</b><small class="muted">마감 2일 전</small></span>${ico('arrow','')}</a>
            </div>
          </div>
          <div class="card">
            <div class="card-h"><h3>다음 세션</h3></div>
            <div class="card-b">
              <div class="li"><span class="av sm" style="background:#EEF0FF;color:#5B4BE8">${ico('cal')}</span><span class="col"><b>5회차 · 김지연</b><small>2024-06-07 (금) 14:00 · 화상(Teams)</small></span></div>
              <div class="li"><span class="av sm" style="background:#EEF0FF;color:#5B4BE8">${ico('cal')}</span><span class="col"><b>5회차 · 이도윤</b><small>2024-06-07 (금) 16:00 · 대면</small></span></div>
              <div class="li"><span class="av sm" style="background:#F0F1F6;color:#727A94">${ico('cal')}</span><span class="col"><b>4회차 · 박서준</b><small>2024-06-10 (월) 10:00 · 화상(Teams)</small></span></div>
            </div>
          </div>
        </div>
      </div>`;
    ring('#ring-coach', 67, { size:104, sub:'체크인 완료' });
  }

  /* ---------------- 고객사 HR ---------------- */
  else if(role === 'hr'){
    const mine = PROJECTS.filter(p => p.clientId === u.clientId);
    const liveP = mine.filter(p => p.status !== '준비중');
    const liveMem = liveP.reduce((a,p) => a + p.members, 0) || 1;
    const hrAvg = k => Math.round(liveP.reduce((a,p) => a + p[k]*p.members, 0) / liveMem);
    P.innerHTML = `
      <div class="card mb16" style="border-color:var(--brand-100);background:var(--grad-soft)">
        <div class="card-b row" style="gap:12px">
          <span class="av" style="background:var(--brand)">${ico('shield')}</span>
          <span class="col">
            <b>${esc(u.org)} 담당자 화면</b>
            <small class="muted">자사에서 진행 중인 프로젝트에서 생성되는 모든 자료를 열람할 수 있습니다. 타 고객사 데이터는 표시되지 않습니다.</small>
          </span>
          <a class="btn pri" href="reports.html">${ico('dl')} 성과 리포트 받기</a>
        </div>
      </div>

      <div class="kpis mb16">
        ${kpi('folder','#EEF0FF','#5B4BE8','우리 회사 프로젝트', mine.length, '개', `진행중 ${liveP.length} · 준비중 ${mine.length-liveP.length}`)}
        ${kpi('users','#E7F7EE','#16A34A','참여 인원', mine.reduce((a,p)=>a+p.members,0), '명', `진행 중 ${liveMem}명`)}
        ${kpi('chart','#E8F1FE','#3B82F6','평균 진척도', hrAvg('progress'), '%', '지난 주 대비 <span class="up">▲ 6%p</span>')}
        ${kpi('check','#FEF3E2','#F59E0B','체크인율', hrAvg('checkin'), '%', '지난 주 대비 <span class="up">▲ 10%p</span>')}
      </div>

      <div class="grid g-2-1 mb16">
        <div class="card">
          <div class="card-h"><h3>프로젝트 진행 현황</h3><span class="spacer"></span><a class="btn sm" href="projects.html">전체 보기 →</a></div>
          <div class="tbl-wrap">
            <table class="tbl">
              <thead><tr><th>프로젝트명</th><th>기간</th><th>대상자</th><th>세션</th><th>진행률</th><th>상태</th></tr></thead>
              <tbody>${mine.map(p => `<tr onclick="location.href='project.html?id=${p.id}'" style="cursor:pointer">
                <td><div class="nm">${esc(p.name)}</div><div class="sub">${esc(p.type)} · 그룹 ${p.groups}개</div></td>
                <td class="num small">${p.start} ~ ${p.end}</td>
                <td class="num">${p.members}명</td>
                <td class="num">${p.done}/${p.sessions}회</td>
                <td><div class="pcell"><b class="num">${p.progress}%</b><span class="pbar"><i style="width:${p.progress}%"></i></span></div></td>
                <td>${stBadge(p.status)}</td>
              </tr>`).join('')}</tbody>
            </table>
          </div>
        </div>
        <div class="card">
          <div class="card-h"><h3>역량 분류별 목표 비중</h3></div>
          <div class="card-b row" style="gap:14px">
            <div id="ch-mix" style="flex:0 0 auto"></div>
            <div class="col" style="flex:1;gap:8px">
              ${ANALYTICS.compMix.map(c => lg(c.c, c.n, c.v, c.p)).join('')}
            </div>
          </div>
        </div>
      </div>

      <div class="grid g2">
        <div class="card">
          <div class="card-h"><h3>많이 설정한 코칭목표 Top 5</h3><span class="spacer"></span><a class="btn ghost sm" href="analytics.html">상세 분석 →</a></div>
          <div class="card-b"><div id="ch-goals"></div></div>
        </div>
        <div class="card">
          <div class="card-h"><h3>주간 체크인 · 실행 추이</h3></div>
          <div class="card-b"><div id="ch-trend2"></div></div>
        </div>
      </div>`;
    donut('#ch-mix', ANALYTICS.compMix.map(c => ({ n:c.n, v:c.v, c:c.c })), '전체', '1,842개');
    hbar('#ch-goals', ANALYTICS.topGoals.slice(0,5), { labelW:118 });
    line('#ch-trend2', { labels: ANALYTICS.trend.labels, series:[
      { n:'체크인율(%)', data: ANALYTICS.trend.checkin, c:'#3B82F6' },
      { n:'평균 진행률(%)', data: ANALYTICS.trend.progress, c:'#5B4BE8' },
    ]});
  }

  /* ---------------- 코칭 대상자 (피코치) ---------------- */
  else {
    const g = GOALS.filter(x => x.userId === 'm1');
    const coach = uById(u.coachId || 'c1');
    P.innerHTML = `
      <div class="hero-c mb16">
        <div class="col">
          <h2>${esc(u.name)}님, 이번 주도 실행 중이시네요 👏</h2>
          <p>이번 주 체크인 마감은 <b>6/2(일)</b>입니다. 실행과제 <b>8/11</b>을 완료했습니다.</p>
          <div class="kv">
            <div><b class="num">2개</b><small>코칭목표</small></div>
            <div><b class="num">6개</b><small>행동지표</small></div>
            <div><b class="num">4/6회</b><small>세션 진행</small></div>
            <div><b class="num">2건</b><small>새 부스터</small></div>
          </div>
        </div>
        <div id="ring-me"></div>
      </div>

      <div class="grid g-2-1">
        <div class="col" style="gap:16px">
          <div class="card">
            <div class="card-h"><h3>나의 코칭목표</h3><span class="spacer"></span><a class="btn sm" href="goal.html">합의서 보기 →</a></div>
            <div class="card-b">
              ${g.map(x => `<div class="goal-c">
                <div class="row mb8" style="gap:6px;flex-wrap:wrap">${x.comp.map(c => `<span class="pill">${esc(c)}</span>`).join('')}</div>
                <div class="t">${esc(x.title)}</div>
                <div class="row"><span class="pbar" style="flex:1"><i style="width:${Math.round(x.nowScore/x.targetScore*100)}%"></i></span>
                  <b class="num small">${Math.round(x.nowScore/x.targetScore*100)}%</b></div>
                <div class="score">
                  <span class="s"><b class="num">${x.startScore}점</b><small>시작 시</small></span>
                  <span class="s"><b class="num">${x.nowScore}점</b><small>현재</small></span>
                  <span class="s fin"><b class="num">${x.targetScore}점</b><small>기대 목표</small></span>
                </div>
                <div class="mt12 small muted">행동지표 ${x.indicators.length}개 · 실행 ${x.indicators.filter(i=>i.status==='완료').length}개 완료</div>
              </div>`).join('')}
            </div>
          </div>

          <div class="card">
            <div class="card-h"><h3>이번 주 실행과제</h3><span class="spacer"></span><a class="btn sm" href="tracking.html">체크인 하러 가기 →</a></div>
            <div class="card-b">
              ${ACTIONS.map(a => `<div class="li">
                <span class="av sm" style="background:${a.status==='완료'?'#E7F7EE':a.status==='진행'?'#EEF0FF':'#F0F1F6'};color:${a.status==='완료'?'#16A34A':a.status==='진행'?'#5B4BE8':'#727A94'}">${ico(a.icon)}</span>
                <span class="col"><b>${esc(a.t)}</b><small>${esc(a.comp)} · 이번 주 ${esc(a.week)}</small></span>
                <span class="pbar" style="width:64px"><i style="width:${a.progress}%"></i></span>
                <span class="badge ${a.status==='완료'?'ok':a.status==='진행'?'info':'gray'}">${a.status}</span>
              </div>`).join('')}
            </div>
          </div>
        </div>

        <div class="col" style="gap:16px">
          <div class="card">
            <div class="card-h"><h3>이번 주 체크인</h3><span class="spacer"></span><span class="badge warn dot">미작성</span></div>
            <div class="card-b">
              <div class="li"><span class="col"><b>체크인 기간</b></span><span class="num small">05.27 ~ 06.02</span></div>
              <div class="li"><span class="col"><b>다음 체크인 마감일</b></span><span class="num small" style="color:var(--danger);font-weight:800">2024.06.02 (일)</span></div>
              <a class="btn pri block mt12" href="tracking.html">${ico('checkbox')} 주간 체크인 작성하기</a>
            </div>
          </div>

          <div class="card">
            <div class="card-h"><h3>최근 코치 피드백</h3><span class="spacer"></span><span class="badge brand">${esc(coach.name)}</span></div>
            <div class="card-b">
              ${FEEDBACKS.filter(f=>f.userId==='m1').map(f => `<div class="insight">
                <div class="ih"><span class="badge brand">${f.type}</span><span class="muted small" style="margin-left:auto;font-weight:600">${f.at}</span></div>
                <p class="small" style="line-height:1.7;color:var(--ink-2)">${esc(f.body)}</p>
                <div class="mt8 small muted">다음 세션 주제: <b style="color:var(--brand-700)">${esc(f.next)}</b></div>
              </div>`).join('')}
            </div>
          </div>

          <div class="card">
            <div class="card-h"><h3>도착한 부스터</h3><span class="spacer"></span><span class="badge danger">2</span></div>
            <div class="card-b">
              ${BOOSTERS.filter(b=>b.userId==='m1'&&b.state==='진행중').map(b => `<a class="todo" href="booster.html">
                <span class="ic" style="background:#F3ECFE;color:#8B5CF6">${ico('zap')}</span>
                <span class="col"><b>${esc(b.topic)}</b><small class="muted">${esc(uById(b.coachId).name)} · 마감 ${b.due}</small></span>
                <span class="badge warn">응답 필요</span>
              </a>`).join('')}
            </div>
          </div>
        </div>
      </div>`;
    ring('#ring-me', 72, { size:104, sub:'이번 주 실행률' });
  }

  /* helpers */
  function kpi(icn, bg, fg, t, v, unit, d){
    return `<div class="kpi">
      <span class="ico" style="background:${bg};color:${fg}">${ico(icn)}</span>
      <span class="col"><span class="t">${t}</span><span class="v num">${v}<small>${unit||''}</small></span><span class="d">${d||''}</span></span>
    </div>`;
  }
  function stBadge(s){
    return s==='진행중' ? '<span class="badge ok">진행중</span>'
      : s==='준비중' ? '<span class="badge info">준비중</span>'
      : '<span class="badge gray">완료</span>';
  }
  function lg(c, n, v, p){
    return `<div class="row" style="gap:8px">
      <i style="width:9px;height:9px;border-radius:3px;background:${c};display:block;flex:0 0 9px"></i>
      <span class="small" style="flex:1">${n}</span>
      <b class="num small">${v}</b><span class="small muted num">(${p}%)</span>
    </div>`;
  }
}
</script>
</body>
</html>
